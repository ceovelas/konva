<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Konva</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#36e0a0;--accent2:#21b37e;--accent-dim:rgba(54,224,160,.14);
    --warn:#ffb13d;--warn-dim:rgba(255,177,61,.14);
    --bad:#ff5f6d;--bad-dim:rgba(255,95,109,.14);
    --blue:#54a3ff;--violet:#9d7bff;
    --radius:18px;--tap:.14s cubic-bezier(.2,.8,.3,1);
  }
  html[data-theme="dark"]{
    --bg:#0c0f14;--bg2:#0e131a;--surface:#151b24;--surface2:#1d2530;--surface3:#252f3d;
    --line:#27313f;--line2:#33404f;--txt:#eef2f8;--muted:#8694a6;--muted2:#5d6b7d;
    --shadow:0 10px 40px rgba(0,0,0,.45);--cardgrad:linear-gradient(165deg,#151b24,#0e131a);
    --glow:radial-gradient(1100px 480px at 50% -8%, rgba(54,224,160,.10), transparent 60%),radial-gradient(800px 400px at 90% 0%, rgba(84,163,255,.06), transparent 55%);
  }
  html[data-theme="light"]{
    --bg:#f4f6fa;--bg2:#fff;--surface:#fff;--surface2:#eef1f6;--surface3:#e3e8f0;
    --line:#e2e7ef;--line2:#d2dae5;--txt:#13202f;--muted:#5e6c7e;--muted2:#9aa6b5;
    --shadow:0 12px 36px rgba(40,60,90,.12);--cardgrad:linear-gradient(165deg,#fff,#f7f9fc);
    --glow:radial-gradient(1100px 480px at 50% -8%, rgba(54,224,160,.12), transparent 60%),radial-gradient(800px 400px at 90% 0%, rgba(84,163,255,.08), transparent 55%);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif}
  html,body{height:100%}
  body{background:var(--glow),var(--bg);color:var(--txt);overscroll-behavior:none;transition:background .3s}
  #app{max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative}
  header{padding:18px 22px 6px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-weight:900;font-size:23px;letter-spacing:-1px}
  .logo span{color:var(--accent)}
  .today-chip{display:flex;align-items:center;gap:7px;background:var(--accent-dim);border:1px solid rgba(54,224,160,.28);padding:7px 13px;border-radius:999px}
  .today-chip .num{font-weight:800;font-size:15px;color:var(--accent)}
  .today-chip .lbl{font-size:11px;font-weight:600;color:var(--accent);opacity:.85}
  nav{display:flex;gap:2px;padding:6px 10px 12px;position:sticky;top:0;background:linear-gradient(var(--bg),var(--bg) 70%,transparent);z-index:8}
  nav button{flex:1;background:transparent;border:none;color:var(--muted2);font-size:10px;font-weight:600;padding:8px 1px;border-radius:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:var(--tap);position:relative}
  nav button .ic{font-size:18px;line-height:1;transition:var(--tap)}
  nav button.active{color:var(--txt)}
  nav button.active::after{content:"";position:absolute;bottom:1px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
  nav button .dot{position:absolute;top:3px;right:calc(50% - 16px);min-width:15px;height:15px;padding:0 3px;background:var(--accent);color:#0c0f14;font-size:9px;font-weight:800;border-radius:99px;display:flex;align-items:center;justify-content:center}
  main{flex:1;padding:0 16px 130px}
  .screen{display:none}
  .screen.active{display:block;animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .h2{font-size:16px;font-weight:800;margin:14px 2px 4px;letter-spacing:-.3px}
  .sub{font-size:12px;color:var(--muted);margin:0 2px 14px;line-height:1.55;font-weight:500}
  .qprog{margin:4px 4px 14px}
  .qprog .bar{height:6px;background:var(--surface3);border-radius:99px;overflow:hidden}
  .qprog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width .4s}
  .qprog .lbl{display:flex;justify-content:space-between;font-size:10.5px;font-weight:700;color:var(--muted2);margin-top:6px}
  .hint-row{display:flex;justify-content:space-between;margin:0 6px 10px;font-size:10.5px;font-weight:700}
  .hint-row .l{color:var(--bad)}.hint-row .r{color:var(--accent)}.hint-row .u{color:var(--warn)}
  .swipe-wrap{position:relative;height:400px;margin-top:14px;touch-action:pan-y}
  .swipe-card{position:absolute;inset:0;background:var(--cardgrad);border:1px solid var(--line);border-radius:26px;padding:26px 24px;text-align:center;box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:center;will-change:transform;user-select:none}
  .swipe-card.behind{transform:scale(.93) translateY(16px);opacity:.5;filter:saturate(.6)}
  .qcount{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.4px;margin-bottom:16px;text-transform:uppercase}
  .qcount b{color:var(--txt)}
  .avatar{width:92px;height:92px;border-radius:28px;margin:0 auto 16px;background:linear-gradient(145deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900;color:#06140e;box-shadow:0 12px 30px rgba(54,224,160,.25)}
  .handle{font-size:24px;font-weight:800;letter-spacing:-.5px;word-break:break-all;line-height:1.1}
  .added-ago{font-size:11px;color:var(--muted2);font-weight:600;margin-top:6px}
  .openlink{display:inline-flex;align-items:center;gap:8px;margin-top:16px;background:var(--surface2);border:1px solid var(--line2);color:var(--blue);padding:12px 20px;border-radius:14px;font-size:14px;font-weight:700;text-decoration:none;transition:var(--tap)}
  .openlink:active{transform:scale(.95)}
  .tmpl-chip{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
  .tmpl-chip button{background:var(--violet);color:#0c0f14;border:none;font-size:11.5px;font-weight:800;padding:9px 13px;border-radius:11px;cursor:pointer;transition:var(--tap)}
  .tmpl-chip button:active{transform:scale(.93)}
  .swipe-badge{position:absolute;top:22px;padding:9px 16px;border-radius:12px;font-weight:900;font-size:15px;letter-spacing:.5px;opacity:0;border:2px solid}
  .swipe-badge.left{right:22px;color:var(--bad);border-color:var(--bad);background:var(--bad-dim);transform:rotate(12deg) scale(.8)}
  .swipe-badge.right{left:22px;color:var(--accent);border-color:var(--accent);background:var(--accent-dim);transform:rotate(-12deg) scale(.8)}
  .swipe-badge.up{left:50%;margin-left:-55px;top:auto;bottom:26px;color:var(--warn);border-color:var(--warn);background:var(--warn-dim)}
  .tap-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:14px}
  .ta{border:none;border-radius:15px;padding:13px 6px;font-size:12px;font-weight:700;cursor:pointer;transition:var(--tap);display:flex;flex-direction:column;align-items:center;gap:5px;color:#0c0f14}
  .ta:active{transform:scale(.93)}.ta .ic{font-size:18px}
  .ta.bad{background:var(--bad)}.ta.story{background:var(--warn)}.ta.wrote{background:var(--accent)}
  .skip-btn{width:100%;margin-top:9px;background:transparent;border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:600;padding:11px;border-radius:13px;cursor:pointer;transition:var(--tap)}
  .skip-btn:active{transform:scale(.97);background:var(--surface)}
  .empty{text-align:center;padding:64px 24px;color:var(--muted)}
  .empty .big{font-size:46px;margin-bottom:14px}
  .empty p{font-size:14px;line-height:1.65;font-weight:500}
  .empty .cta{margin-top:18px;display:inline-block;background:var(--accent);color:#0c0f14;font-weight:800;padding:13px 24px;border-radius:14px;font-size:14px;border:none;cursor:pointer}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:11px}
  .row{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
  .row .h{font-weight:700;font-size:14px;flex:1;word-break:break-all}
  .ig{color:var(--blue);text-decoration:none;font-size:19px;flex-shrink:0}
  .pill{font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:999px;white-space:nowrap;letter-spacing:.2px}
  .pill.ans{background:rgba(84,163,255,.14);color:var(--blue)}
  .pill.call{background:var(--warn-dim);color:var(--warn)}
  .pill.won{background:var(--accent-dim);color:var(--accent)}
  .pill.lost{background:var(--bad-dim);color:var(--bad)}
  .fcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .fcard .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .stage-label{font-size:10px;color:var(--muted2);margin:14px 0 7px;font-weight:800;text-transform:uppercase;letter-spacing:.6px}
  .funnel-actions{display:flex;gap:8px;flex-wrap:wrap}
  .mini{border:1px solid var(--line2);background:var(--surface2);color:var(--txt);font-size:12px;font-weight:700;padding:9px 14px;border-radius:11px;cursor:pointer;transition:var(--tap)}
  .mini:active{transform:scale(.93)}
  .mini.on-ans{background:var(--blue);color:#fff;border-color:var(--blue)}
  .mini.on-call{background:var(--warn);color:#0c0f14;border-color:var(--warn)}
  .mini.on-won{background:var(--accent);color:#0c0f14;border-color:var(--accent)}
  .mini.on-lost{background:var(--bad);color:#0c0f14;border-color:var(--bad)}
  .amount-box{margin-top:11px;display:flex;align-items:center;gap:9px;background:var(--accent-dim);border:1px solid rgba(54,224,160,.3);border-radius:12px;padding:10px 13px}
  .amount-box label{font-size:12px;font-weight:700;color:var(--accent)}
  .amount-box input{flex:1;background:transparent;border:none;color:var(--txt);font-size:16px;font-weight:800;text-align:right;outline:none;font-family:inherit}
  .amount-box .cur{font-size:13px;font-weight:700;color:var(--muted)}
  .note-box{margin-top:11px}
  .note-input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:11px 13px;font-size:13px;font-weight:500;resize:none;min-height:42px;font-family:inherit}
  .note-input:focus{outline:none;border-color:var(--warn)}
  .note-saved{font-size:11px;color:var(--warn);font-weight:700;margin-top:6px}
  .timer{font-size:11px;color:var(--warn);font-weight:700}.timer.ready{color:var(--accent)}
  textarea.load{width:100%;min-height:150px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);color:var(--txt);padding:15px;font-size:14px;resize:vertical;line-height:1.55;font-weight:500;font-family:inherit}
  textarea.load:focus{outline:none;border-color:var(--accent)}
  .btn{width:100%;border:none;border-radius:15px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;transition:var(--tap);color:#0c0f14}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--accent);margin-top:13px}
  .btn-sec{background:var(--surface2);color:var(--txt);border:1px solid var(--line2);margin-top:10px}
  .preview{margin-top:13px;font-size:12px;color:var(--muted);font-weight:600;line-height:1.5}
  .preview b{color:var(--accent)}
  .danger{color:var(--bad);font-size:12px;text-align:center;width:100%;background:transparent;border:none;margin-top:24px;cursor:pointer;font-weight:700;text-decoration:underline}
  .batch-bar{background:var(--violet);color:#0c0f14;border-radius:14px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;font-weight:800;font-size:13px}
  .batch-bar button{background:rgba(12,15,20,.2);border:none;color:#0c0f14;font-weight:800;padding:8px 13px;border-radius:10px;font-size:12px;cursor:pointer}
  .batch-grid{display:flex;gap:7px;margin-top:10px}
  .bg-btn{flex:1;border:none;border-radius:11px;padding:11px 4px;font-size:11.5px;font-weight:800;cursor:pointer;color:#0c0f14;transition:var(--tap)}
  .bg-btn:active{transform:scale(.93)}
  .bg-btn.w{background:var(--accent)}.bg-btn.s{background:var(--warn)}.bg-btn.b{background:var(--bad)}
  .bg-done{opacity:.4}
  .bopen{display:block;text-align:center;background:var(--surface2);border:1px solid var(--line2);color:var(--blue);padding:11px;border-radius:11px;font-weight:700;font-size:13px;text-decoration:none;margin-bottom:8px}
  .seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:4px;margin-bottom:14px;gap:3px}
  .seg button{flex:1;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:700;padding:10px;border-radius:10px;cursor:pointer;transition:var(--tap)}
  .seg button.active{background:var(--surface3);color:var(--txt)}
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .kpi{background:var(--cardgrad);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .kpi .n{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:6px;font-weight:600}
  .kpi.green .n{color:var(--accent)}.kpi.warn .n{color:var(--warn)}.kpi.bad .n{color:var(--bad)}.kpi.blue .n{color:var(--blue)}.kpi.money .n{color:var(--accent);font-size:26px}
  .conv-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;margin-top:11px}
  .conv-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:8px}
  .conv-row b{color:var(--txt);font-size:14px;font-weight:800}
  .conv-row .pct{color:var(--accent);font-weight:900;font-size:15px}
  .track{height:9px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-bottom:16px}
  .track:last-child{margin-bottom:0}
  .track i{display:block;height:100%;border-radius:99px;transition:width .6s cubic-bezier(.3,.9,.3,1)}
  .track i.g{background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .track i.w{background:linear-gradient(90deg,#d98a1f,var(--warn))}
  .track i.b{background:linear-gradient(90deg,#3576c2,var(--blue))}
  .vfunnel{margin-top:11px}
  .vstep{margin-bottom:8px}
  .vstep .vlbl{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:5px}
  .vstep .vlbl .vn{color:var(--txt)}.vstep .vlbl .vp{color:var(--muted);font-size:11px;font-weight:600}
  .vbar{height:36px;border-radius:11px;display:flex;align-items:center;padding-left:13px;color:#0c0f14;font-weight:900;font-size:14px;min-width:46px;transition:width .6s cubic-bezier(.3,.9,.3,1)}
  .chart-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px 14px 12px;margin-top:11px}
  .chart-title{font-size:13px;font-weight:800;margin:0 4px 14px;display:flex;align-items:center;justify-content:space-between}
  .chart-title span{font-size:11px;color:var(--muted);font-weight:600}
  svg.chart{width:100%;display:block;overflow:visible}
  .bar-lbl{font-size:9px;fill:var(--muted2);font-weight:700}.bar-val{font-size:10px;fill:var(--txt);font-weight:800}
  .cmp{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:9px}
  .cmp .col{text-align:center}.cmp .col .cn{font-size:26px;font-weight:900;letter-spacing:-1px}
  .cmp .col .cl{font-size:10px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
  .cmp .arrow{font-size:12px;font-weight:900;padding:5px 9px;border-radius:10px}
  .cmp .arrow.up{background:var(--accent-dim);color:var(--accent)}.cmp .arrow.down{background:var(--bad-dim);color:var(--bad)}.cmp .arrow.flat{background:var(--surface3);color:var(--muted)}
  .cmp-now .cn{color:var(--accent)}.cmp-prev .cn{color:var(--muted)}
  .cmp-title{font-size:11px;font-weight:800;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin:18px 4px 2px}
  .set-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:13px}
  .set-block h3{font-size:14px;font-weight:800;margin-bottom:4px}
  .set-block .d{font-size:11.5px;color:var(--muted);font-weight:500;margin-bottom:13px;line-height:1.5}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--line)}
  .toggle-row:first-of-type{border-top:none}
  .toggle-row span{font-size:13px;font-weight:600}
  .sw{width:46px;height:27px;background:var(--surface3);border-radius:99px;position:relative;cursor:pointer;transition:var(--tap);flex-shrink:0}
  .sw.on{background:var(--accent)}
  .sw i{position:absolute;top:3px;left:3px;width:21px;height:21px;background:#fff;border-radius:50%;transition:var(--tap);box-shadow:0 2px 5px rgba(0,0,0,.3)}
  .sw.on i{left:22px}
  .tmpl-item{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px;display:flex;gap:10px;align-items:flex-start}
  .tmpl-item .txt{flex:1;font-size:13px;font-weight:500;line-height:1.45;word-break:break-word}
  .tmpl-item .del{background:var(--bad-dim);color:var(--bad);border:none;width:28px;height:28px;border-radius:8px;font-weight:900;cursor:pointer;flex-shrink:0;font-size:15px}
  .tmpl-add{display:flex;gap:8px;margin-top:6px}
  .tmpl-add textarea{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:11px;color:var(--txt);padding:10px 12px;font-size:13px;font-weight:500;resize:none;min-height:40px;font-family:inherit}
  .tmpl-add textarea:focus{outline:none;border-color:var(--violet)}
  .tmpl-add button{background:var(--violet);color:#0c0f14;border:none;border-radius:11px;font-weight:800;padding:0 18px;cursor:pointer;font-size:13px}
  .onb{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center}
  .onb .ic{font-size:64px;margin-bottom:24px;animation:pop .4s cubic-bezier(.3,1.4,.5,1)}
  @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  .onb h1{font-size:26px;font-weight:900;letter-spacing:-.8px;margin-bottom:14px}
  .onb h1 span{color:var(--accent)}
  .onb p{font-size:15px;color:var(--muted);font-weight:500;line-height:1.65;max-width:340px;margin-bottom:8px}
  .onb .dots{display:flex;gap:8px;margin:28px 0}
  .onb .dots i{width:8px;height:8px;border-radius:50%;background:var(--surface3);transition:var(--tap)}
  .onb .dots i.on{background:var(--accent);width:22px;border-radius:99px}
  .onb .navb{display:flex;gap:12px;width:100%;max-width:340px}
  .onb .navb button{flex:1;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer}
  .onb .skip{background:transparent;color:var(--muted2);flex:0 0 auto !important;padding:15px 18px !important}
  .onb .next{background:var(--accent);color:#0c0f14}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--surface3);border:1px solid var(--line2);color:var(--txt);padding:13px 18px;border-radius:15px;font-size:13.5px;font-weight:700;z-index:60;transition:transform .32s cubic-bezier(.2,.9,.3,1);max-width:92%;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast .undo{background:var(--accent);color:#0c0f14;border:none;font-weight:900;padding:8px 15px;border-radius:11px;font-size:13px;cursor:pointer;white-space:nowrap}
  .toast .ring{width:20px;height:20px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Kon<span>va</span></div>
    <div class="today-chip"><span class="num" id="today-num">0</span><span class="lbl">сегодня</span></div>
  </header>
  <nav>
    <button data-tab="work" class="active"><span class="ic">⚡️</span>Отписка</button>
    <button data-tab="funnel"><span class="ic">📞</span>Воронка</button>
    <button data-tab="later"><span class="ic">🕓</span>Сторис</button>

  <main>

</div>
<div class="toast" id="toast"></div>
<div id="onb-root"></div>
<script>
const DAY_MS=864e5,KEY="konva_v3";
const DEFAULTS={leads:[],templates:["Привет! Увидел твой профиль 🙌","Здравствуйте! Хочу предложить сотрудничество"],settings:{theme:"dark",haptics:true,stageAnswered:true,stageCall:true,currency:"₽"},onboarded:false};
let state=loadState();
function loadState(){let s=null;
  try{s=JSON.parse(localStorage.getItem(KEY))}catch(e){}
  if(!s){try{const o=JSON.parse(localStorage.getItem("konva_v2"));if(o&&o.leads)s={leads:o.leads}}catch(e){}}
  if(!s){try{const o=JSON.parse(localStorage.getItem("leadflow_v1"));if(o&&o.leads)s={leads:o.leads}}catch(e){}}
  s=s||{};
  return {leads:s.leads||[],templates:s.templates||DEFAULTS.templates.slice(),settings:Object.assign({},DEFAULTS.settings,s.settings||{}),onboarded:!!s.onboarded}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function buzz(type){if(!state.settings.haptics)return;try{const tg=window.Telegram&&window.Telegram.WebApp;if(tg&&tg.HapticFeedback){tg.HapticFeedback.impactOccurred(type||"medium");return}}catch(e){}if(navigator.vibrate)navigator.vibrate(18)}
function parseLeads(text){const found=new Set(),out=[];
  text.split(/[\s,;]+/).forEach(tok=>{tok=tok.trim();if(!tok)return;let h=null;
    const u=tok.match(/instagram\.com\/([A-Za-z0-9_.]+)/i);if(u)h=u[1];else if(tok.startsWith("@"))h=tok.slice(1);
    else if(/^[A-Za-z0-9_.]{2,}$/.test(tok)&&!tok.includes(".com")&&!/^https?$/i.test(tok))h=tok;
    if(h){h=h.replace(/\/+$/,"").toLowerCase();if(h&&!["p","reel","stories","www","http","https"].includes(h)&&!found.has(h)){found.add(h);out.push(h)}}});
  return out}
function addLeads(hs){const ex=new Set(state.leads.map(l=>l.handle));let n=0;
  hs.forEach(h=>{if(!ex.has(h)){state.leads.push({id:Date.now()+"_"+Math.random().toString(36).slice(2,7),handle:h,status:"queue",addedAt:Date.now()});ex.add(h);n++}});
  save();return n}
const igUrl=h=>"https://instagram.com/"+h;
const queue=()=>state.leads.filter(l=>l.status==="queue").sort((a,b)=>a.addedAt-b.addedAt);
function ago(ts){const d=Date.now()-ts,h=Math.floor(d/36e5);if(h<1)return"только что";if(h<24)return h+"ч назад";return Math.floor(h/24)+"д назад"}
function fmtLeft(ms){if(ms<=0)return"готов";const h=Math.floor(ms/36e5),m=Math.floor((ms%36e5)/6e4);return h>0?h+"ч "+m+"м":m+"м"}
function startOfDay(ts){const d=new Date(ts);d.setHours(0,0,0,0);return d.getTime()}
function todayWrote(){const t=startOfDay(Date.now());return state.leads.filter(l=>l.wroteAt&&l.wroteAt>=t).length}
const cur=()=>state.settings.currency||"₽";
function copyText(t){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast("Скопировано ✓")).catch(()=>fallbackCopy(t))}else fallbackCopy(t)}
function fallbackCopy(t){const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity=0;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("Скопировано ✓")}catch(e){toast("Не вышло скопировать")}document.body.removeChild(ta)}
let undoTimer;
function toast(msg,undoFn){const t=document.getElementById("toast");clearTimeout(undoTimer);
  if(undoFn){t.innerHTML=`<svg class="ring" viewBox="0 0 36 36"><circle cx="18" cy="18" r="15" fill="none" stroke="#33404f" stroke-width="3"/><circle id="ringp" cx="18" cy="18" r="15" fill="none" stroke="#36e0a0" stroke-width="3" stroke-linecap="round" stroke-dasharray="94.2" stroke-dashoffset="0" transform="rotate(-90 18 18)"/></svg><span>${msg}</span><button class="undo">Отмена</button>`;
    t.querySelector(".undo").onclick=()=>{undoFn();t.classList.remove("show");clearTimeout(undoTimer)};
    const r=t.querySelector("#ringp");if(r){r.style.transition="stroke-dashoffset 5s linear";requestAnimationFrame(()=>r.style.strokeDashoffset="94.2")}
    t.classList.add("show");undoTimer=setTimeout(()=>t.classList.remove("show"),5000);
  }else{t.innerHTML=`<span>${msg}</span>`;t.classList.add("show");undoTimer=setTimeout(()=>t.classList.remove("show"),1700)}}
let batchSession={start:0};
function renderWork(){const body=document.getElementById("work-body"),q=queue();
  if(!q.length){body.innerHTML=`<div class="empty"><div class="big">🎉</div><p>Очередь пуста.<br>Загрузи лидов или загляни в «Сторис».</p><button class="cta" onclick="show('load')">Загрузить лидов</button></div>`;return}
  const l=q[0],next=q[1];
  if(!batchSession.start||batchSession.start>q.length)batchSession.start=q.length;
  const total=batchSession.start,doneN=total-q.length,prog=total?Math.round(doneN/total*100):0;
  const tmpls=state.templates||[];
  body.innerHTML=`
    <div class="qprog"><div class="bar"><i style="width:${prog}%"></i></div><div class="lbl"><span>пройдено ${doneN} из ${total}</span><span>${q.length} осталось</span></div></div>
    <div class="hint-row"><span class="l">← не подходит</span><span class="u">↑ нет сторис</span><span class="r">написал →</span></div>
    <div class="swipe-wrap" id="sw">
      ${next?`<div class="swipe-card behind"><div class="qcount">в очереди <b>${q.length}</b></div><div class="avatar">${next.handle.charAt(0).toUpperCase()}</div><div class="handle">@${next.handle}</div></div>`:""}
      <div class="swipe-card" id="topcard">
        <div class="swipe-badge left">НЕ ПОДХОДИТ</div><div class="swipe-badge right">НАПИСАЛ</div><div class="swipe-badge up">НЕТ СТОРИС</div>
        <div class="qcount">в очереди <b>${q.length}</b></div>
        <div class="avatar">${l.handle.charAt(0).toUpperCase()}</div>
        <div class="handle">@${l.handle}</div>
        <div class="added-ago">добавлен ${ago(l.addedAt)}</div>
        <a class="openlink" href="${igUrl(l.handle)}" target="_blank" rel="noopener">↗ Открыть в Instagram</a>
        ${tmpls.length?`<div class="tmpl-chip">${tmpls.map((t,i)=>`<button data-tmpl="${i}">📋 Заход ${i+1}</button>`).join("")}</div>`:""}
      </div>
    </div>
    <div class="tap-actions">
      <button class="ta bad" data-act="bad"><span class="ic">🚫</span>Не подходит</button>
      <button class="ta story" data-act="nostory"><span class="ic">🕓</span>Нет сторис</button>
      <button class="ta wrote" data-act="wrote"><span class="ic">✅</span>Написал</button>
    </div>
    <button class="skip-btn" data-act="skip">↓ Скип — в конец очереди</button>`;
  body.querySelectorAll("[data-act]").forEach(b=>b.onclick=()=>doAct(l.id,b.dataset.act));
  body.querySelectorAll("[data-tmpl]").forEach(b=>b.onclick=()=>copyText(state.templates[+b.dataset.tmpl]));
  initSwipe(l)}
function initSwipe(l){const card=document.getElementById("topcard");if(!card)return;
  const bl=card.querySelector(".left"),br=card.querySelector(".right"),bu=card.querySelector(".up");
  let sx=0,sy=0,dx=0,dy=0,drag=false;
  const onStart=e=>{if(e.target.closest("a,button"))return;const p=e.touches?e.touches[0]:e;sx=p.clientX;sy=p.clientY;drag=true;card.style.transition="none"};
  const onMove=e=>{if(!drag)return;const p=e.touches?e.touches[0]:e;dx=p.clientX-sx;dy=p.clientY-sy;const horiz=Math.abs(dx)>Math.abs(dy);
    card.style.transform=`translate(${dx}px,${dy}px) rotate(${dx*.04}deg)`;
    br.style.opacity=horiz&&dx>30?Math.min(dx/120,1):0;br.style.transform=`rotate(-12deg) scale(${dx>30?1:.8})`;
    bl.style.opacity=horiz&&dx<-30?Math.min(-dx/120,1):0;bl.style.transform=`rotate(12deg) scale(${dx<-30?1:.8})`;
    bu.style.opacity=!horiz&&dy<-30?Math.min(-dy/120,1):0;bu.style.transform=`scale(${dy<-30?1:.8})`;
    if(e.cancelable&&(horiz||dy<-20))e.preventDefault()};
  const onEnd=()=>{if(!drag)return;drag=false;card.style.transition="transform .3s cubic-bezier(.4,0,.6,1)";
    const TH=92,horiz=Math.abs(dx)>Math.abs(dy);
    if(horiz&&dx>TH){buzz("medium");fly(card,600,40);doAct(l.id,"wrote")}
    else if(horiz&&dx<-TH){buzz("medium");fly(card,-600,40);doAct(l.id,"bad")}
    else if(!horiz&&dy<-TH){buzz("medium");fly(card,0,-700);doAct(l.id,"nostory")}
    else{card.style.transform="";br.style.opacity=bl.style.opacity=bu.style.opacity=0}dx=dy=0};
  card.addEventListener("touchstart",onStart,{passive:true});
  card.addEventListener("touchmove",onMove,{passive:false});
  card.addEventListener("touchend",onEnd);
  card.addEventListener("mousedown",onStart);window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onEnd)}
function fly(card,x,y){card.style.transform=`translate(${x}px,${y}px) rotate(${x*.05}deg)`;card.style.opacity=0}
function doAct(id,act){const l=state.leads.find(x=>x.id===id);if(!l)return;
  const prev={status:l.status,wroteAt:l.wroteAt,badAt:l.badAt,nostoryAt:l.nostoryAt,addedAt:l.addedAt,call:l.call,deal:l.deal,answered:l.answered};
  const undo=()=>{Object.assign(l,prev);save();renderWork();refresh()};
  if(act==="wrote"){l.status="wrote";l.wroteAt=Date.now();l.call=null;l.deal=null;l.answered=null;save();renderWork();refresh();toast("Написал → в воронку",undo)}
  else if(act==="bad"){l.status="bad";l.badAt=Date.now();save();renderWork();refresh();toast("Не подходит",undo)}
  else if(act==="nostory"){l.status="nostory";l.nostoryAt=Date.now();save();renderWork();refresh();toast("Нет сторис · вернётся через 24ч",undo)}
  else if(act==="skip"){const mx=Math.max(...state.leads.map(x=>x.addedAt));l.addedAt=mx+1;save();renderWork();toast("В конец очереди")}}
let funnelFilter="all";
function renderFunnel(){const body=document.getElementById("funnel-body"),S=state.settings;
  let arr=state.leads.filter(l=>l.status==="wrote");
  if(funnelFilter==="call")arr=arr.filter(l=>l.call==="yes");
  if(funnelFilter==="won")arr=arr.filter(l=>l.deal==="won");
  arr.sort((a,b)=>(b.wroteAt||0)-(a.wroteAt||0));
  if(!arr.length){body.innerHTML=`<div class="empty"><div class="big">📭</div><p>Пока пусто. Кому напишешь — появятся здесь.</p></div>`;return}
  body.innerHTML=arr.map(l=>{
    const ans=l.answered==="yes",cy=l.call==="yes",cn=l.call==="no",won=l.deal==="won",lost=l.deal==="lost";
    let pills="";if(ans)pills+=`<span class="pill ans">ответил</span>`;if(cy)pills+=`<span class="pill call">созвон</span>`;if(won)pills+=`<span class="pill won">оплата${l.amount?" · "+l.amount+cur():""}</span>`;if(lost)pills+=`<span class="pill lost">не закрыл</span>`;
    let stages="";
    if(S.stageAnswered)stages+=`<div class="stage-label">Ответил?</div><div class="funnel-actions"><button class="mini ${ans?'on-ans':''}" data-id="${l.id}" data-set="answered:yes">Ответил</button><button class="mini ${l.answered==='no'?'on-lost':''}" data-id="${l.id}" data-set="answered:no">Не ответил</button></div>`;
    const callGate=!S.stageAnswered||ans;
    if(S.stageCall&&callGate)stages+=`<div class="stage-label">Созвон</div><div class="funnel-actions"><button class="mini ${cy?'on-call':''}" data-id="${l.id}" data-set="call:yes">Состоялся</button><button class="mini ${cn?'on-lost':''}" data-id="${l.id}" data-set="call:no">Не состоялся</button></div>`;
    const dealGate=S.stageCall?cy:(S.stageAnswered?ans:true);
    if(dealGate)stages+=`<div class="stage-label">Сделка</div><div class="funnel-actions"><button class="mini ${won?'on-won':''}" data-id="${l.id}" data-set="deal:won">Закрыл · оплата</button><button class="mini ${lost?'on-lost':''}" data-id="${l.id}" data-set="deal:lost">Не закрыл</button></div>`;
    let extra="";
    if(won)extra+=`<div class="amount-box"><label>💰 Сумма</label><input type="number" inputmode="numeric" data-amt="${l.id}" value="${l.amount||""}" placeholder="0"><span class="cur">${cur()}</span></div>`;
    if(dealGate)extra+=`<div class="note-box"><textarea class="note-input" data-note="${l.id}" placeholder="Заметка — напр. созвон в пятницу 12:00 мск">${l.note||""}</textarea>${l.note?`<div class="note-saved">📌 сохранено</div>`:""}</div>`;
    return `<div class="fcard"><div class="top"><div class="h" style="flex:1;font-weight:800;font-size:15px">@${l.handle}</div>${pills}<a class="ig" href="${igUrl(l.handle)}" target="_blank" rel="noopener">↗</a></div>${stages}${extra}</div>`}).join("");
  body.querySelectorAll("[data-set]").forEach(b=>b.onclick=()=>{
    const l=state.leads.find(x=>x.id===b.dataset.id),[f,v]=b.dataset.set.split(":");
    if(l[f]===v){l[f]=null;if(f==="answered"){l.call=null;l.deal=null}if(f==="call")l.deal=null}
    else{l[f]=v;if(f==="answered"&&v==="no"){l.call=null;l.deal=null}if(f==="call"&&v==="no")l.deal=null}
    save();renderFunnel();refresh()});
  body.querySelectorAll("[data-amt]").forEach(inp=>{let dt;inp.oninput=()=>{clearTimeout(dt);dt=setTimeout(()=>{const l=state.leads.find(x=>x.id===inp.dataset.amt);l.amount=inp.value?+inp.value:null;save();refresh()},500)}});
  body.querySelectorAll("[data-note]").forEach(t=>{let dt;t.oninput=()=>{clearTimeout(dt);dt=setTimeout(()=>{const l=state.leads.find(x=>x.id===t.dataset.note);l.note=t.value;save()},500)}})}
function renderLater(){const body=document.getElementById("later-body");
  const arr=state.leads.filter(l=>l.status==="nostory").sort((a,b)=>(a.nostoryAt||0)-(b.nostoryAt||0));
  if(!arr.length){body.innerHTML=`<div class="empty"><div class="big">🕓</div><p>Никто не ждёт сторис.</p></div>`;return}
  const now=Date.now();
  body.innerHTML=arr.map(l=>{const left=(l.nostoryAt+DAY_MS)-now,r=left<=0;
    return `<div class="row"><a class="ig" href="${igUrl(l.handle)}" target="_blank" rel="noopener">↗</a><div class="h">@${l.handle}<br><span class="timer ${r?'ready':''}">${r?'✓ можно проверять':'через '+fmtLeft(left)}</span></div><button class="mini ${r?'on-won':''}" data-back="${l.id}">${r?'В отписку':'Вернуть'}</button></div>`}).join("");
  body.querySelectorAll("[data-back]").forEach(b=>b.onclick=()=>{const l=state.leads.find(x=>x.id===b.dataset.back);l.status="queue";l.addedAt=Date.now();save();toast("Вернул в очередь");renderLater();refresh()})}
let dashPeriod="day";
function inPeriod(ts,p){if(!ts)return false;const now=Date.now();if(p==="all")return true;if(p==="day")return ts>=startOfDay(now);if(p==="week")return ts>=now-7*DAY_MS;if(p==="month")return ts>=now-30*DAY_MS}
function renderDash(){const body=document.getElementById("dash-body"),p=dashPeriod,L=state.leads,S=state.settings;
  const wrote=L.filter(l=>inPeriod(l.wroteAt,p)).length;
  const bad=L.filter(l=>inPeriod(l.badAt,p)).length;
  const answered=L.filter(l=>l.answered==="yes"&&inPeriod(l.wroteAt,p)).length;
  const calls=L.filter(l=>l.call==="yes"&&inPeriod(l.wroteAt,p)).length;
  const wonArr=L.filter(l=>l.deal==="won"&&inPeriod(l.wroteAt,p));
  const wonN=wonArr.length,money=wonArr.reduce((s,l)=>s+(+l.amount||0),0);
  const nostory=L.filter(l=>l.status==="nostory").length,inq=L.filter(l=>l.status==="queue").length;
  const periodName={day:"сегодня",week:"за 7 дней",month:"за 30 дней",all:"за всё время"}[p];
  let html=`<div class="kpi-grid">
    <div class="kpi green"><div class="n">${wrote}</div><div class="l">написал ${periodName}</div></div>
    <div class="kpi money"><div class="n">${money.toLocaleString("ru-RU")}${cur()}</div><div class="l">заработано</div></div>
    <div class="kpi blue"><div class="n">${calls}</div><div class="l">созвонов</div></div>
    <div class="kpi"><div class="n">${wonN}</div><div class="l">оплат получено</div></div>
  </div>`;
  html+=`<div class="chart-card"><div class="chart-title">Воронка <span>${periodName}</span></div>${funnelViz(wrote,answered,calls,wonN,S)}</div>`;
  const ansC=wrote&&S.stageAnswered?Math.round(answered/wrote*100):0;
  const callBase=S.stageAnswered?answered:wrote;
  const callC=callBase?Math.round(calls/callBase*100):0;
  const wonBase=S.stageCall?calls:callBase;
  const wonC=wonBase?Math.round(wonN/wonBase*100):0;
  html+=`<div class="conv-card">`;
  if(S.stageAnswered)html+=`<div class="conv-row"><span>Написал → Ответил</span><span><b>${answered}/${wrote}</b> · <span class="pct">${ansC}%</span></span></div><div class="track"><i class="b" style="width:${ansC}%"></i></div>`;
  if(S.stageCall)html+=`<div class="conv-row"><span>${S.stageAnswered?"Ответил":"Написал"} → Созвон</span><span><b>${calls}/${callBase}</b> · <span class="pct">${callC}%</span></span></div><div class="track"><i class="w" style="width:${callC}%"></i></div>`;
  html+=`<div class="conv-row"><span>${S.stageCall?"Созвон":(S.stageAnswered?"Ответил":"Написал")} → Оплата</span><span><b>${wonN}/${wonBase}</b> · <span class="pct">${wonC}%</span></span></div><div class="track"><i class="g" style="width:${wonC}%"></i></div></div>`;
  html+=`<div class="chart-card"><div class="chart-title">Отписки по дням <span>последние 7 дней</span></div>${barChart7()}</div>`;
  html+=`<div class="cmp-title">Эта неделя vs прошлая</div>${compareBlock()}`;
  html+=`<div class="kpi-grid" style="margin-top:11px"><div class="kpi warn"><div class="n">${nostory}</div><div class="l">ждут сторис</div></div><div class="kpi"><div class="n">${inq}</div><div class="l">в очереди</div></div></div>`;
  html+=`<button class="btn btn-sec" id="export-btn" style="margin-top:16px">⬇️ Экспорт базы в CSV</button>`;
  body.innerHTML=html;
  const ex=document.getElementById("export-btn");if(ex)ex.onclick=exportCSV}
function funnelViz(wrote,answered,calls,won,S){
  const steps=[{l:"Написал",v:wrote,c:"var(--accent)"}];
  if(S.stageAnswered)steps.push({l:"Ответили",v:answered,c:"var(--blue)"});
  if(S.stageCall)steps.push({l:"Созвон",v:calls,c:"var(--warn)"});
  steps.push({l:"Оплата",v:won,c:"var(--accent)"});
  const max=Math.max(1,wrote);
  return `<div class="vfunnel">${steps.map((s,i)=>{const w=Math.max(12,Math.round(s.v/max*100)),pct=wrote?Math.round(s.v/wrote*100):0;
    return `<div class="vstep"><div class="vlbl"><span class="vn">${s.l}</span><span class="vp">${s.v}${i>0?" · "+pct+"% от старта":""}</span></div><div class="vbar" style="width:${w}%;background:${s.c}">${s.v}</div></div>`}).join("")}</div>`}
function barChart7(){const days=[],now=Date.now();
  for(let i=6;i>=0;i--){const d0=startOfDay(now-i*DAY_MS);days.push({t:d0,label:new Date(d0).toLocaleDateString("ru-RU",{weekday:"short"}),c:0,won:0})}
  state.leads.forEach(l=>{if(l.wroteAt){const d0=startOfDay(l.wroteAt),day=days.find(x=>x.t===d0);if(day){day.c++;if(l.deal==="won")day.won++}}});
  const max=Math.max(1,...days.map(d=>d.c)),W=440,H=150,pad=22,bw=40,gap=(W-pad*2-bw*7)/6;let bars="";
  days.forEach((d,i)=>{const x=pad+i*(bw+gap),bh=(d.c/max)*(H-44),y=H-24-bh;
    bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="6" fill="url(#bg)"/>`;
    if(d.won>0){const wh=(d.won/max)*(H-44);bars+=`<rect x="${x}" y="${H-24-wh}" width="${bw}" height="${wh}" rx="6" fill="#36e0a0"/>`}
    if(d.c>0)bars+=`<text x="${x+bw/2}" y="${y-6}" text-anchor="middle" class="bar-val">${d.c}</text>`;
    bars+=`<text x="${x+bw/2}" y="${H-8}" text-anchor="middle" class="bar-lbl">${d.label}</text>`});
  return `<svg class="chart" viewBox="0 0 ${W} ${H}"><defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2a3848"/><stop offset="1" stop-color="#1d2530"/></linearGradient></defs>${bars}</svg>`}
function compareBlock(){const now=Date.now();
  const tW=state.leads.filter(l=>l.wroteAt&&l.wroteAt>=now-7*DAY_MS).length;
  const pW=state.leads.filter(l=>l.wroteAt&&l.wroteAt>=now-14*DAY_MS&&l.wroteAt<now-7*DAY_MS).length;
  const tWon=state.leads.filter(l=>l.deal==="won"&&l.wroteAt&&l.wroteAt>=now-7*DAY_MS).length;
  const pWon=state.leads.filter(l=>l.deal==="won"&&l.wroteAt&&l.wroteAt>=now-14*DAY_MS&&l.wroteAt<now-7*DAY_MS).length;
  const arrow=(a,b)=>a>b?`<div class="arrow up">▲ ${b?Math.round((a-b)/b*100):100}%</div>`:a<b?`<div class="arrow down">▼ ${b?Math.round((b-a)/b*100):0}%</div>`:`<div class="arrow flat">=</div>`;
  return `<div class="cmp"><div class="col cmp-prev"><div class="cn">${pW}</div><div class="cl">прошлая</div></div>${arrow(tW,pW)}<div class="col cmp-now"><div class="cn">${tW}</div><div class="cl">эта · отписки</div></div></div>
  <div class="cmp" style="margin-top:9px"><div class="col cmp-prev"><div class="cn">${pWon}</div><div class="cl">прошлая</div></div>${arrow(tWon,pWon)}<div class="col cmp-now"><div class="cn">${tWon}</div><div class="cl">эта · оплаты</div></div></div>`}
function exportCSV(){const head="handle,status,answered,call,deal,amount,note,added,wrote\n";
  const rows=state.leads.map(l=>[l.handle,l.status,l.answered||"",l.call||"",l.deal||"",l.amount||"",(l.note||"").replace(/[,\n]/g," "),new Date(l.addedAt).toLocaleString("ru-RU"),l.wroteAt?new Date(l.wroteAt).toLocaleString("ru-RU"):""].join(","));
  const blob=new Blob([head+rows.join("\n")],{type:"text/csv"}),a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="konva_"+new Date().toISOString().slice(0,10)+".csv";a.click();toast("CSV выгружен")}
function startBatch(){const q=queue().slice(0,10);if(!q.length){toast("Очередь пуста");return}show("work");
  const body=document.getElementById("work-body");let done=0;
  body.innerHTML=`<div class="batch-bar"><span>Батч · <b id="bdone">0</b>/${q.length} готово</span><button id="bexit">Выйти</button></div>
    <p class="sub">Открой всех подряд, потом проставь статусы.</p>
    <div id="blist">${q.map(l=>`<div class="card" id="bc_${l.id}"><a class="bopen" href="${igUrl(l.handle)}" target="_blank" rel="noopener">↗ @${l.handle}</a><div class="batch-grid"><button class="bg-btn w" data-bid="${l.id}" data-ba="wrote">✅ Написал</button><button class="bg-btn s" data-bid="${l.id}" data-ba="nostory">🕓 Сторис</button><button class="bg-btn b" data-bid="${l.id}" data-ba="bad">🚫 Не то</button></div></div>`).join("")}</div>
    <button class="btn btn-primary" id="bfinish" style="margin-top:14px">Готово · к отписке</button>`;
  body.querySelectorAll("[data-ba]").forEach(b=>b.onclick=()=>{buzz("light");doActSilent(b.dataset.bid,b.dataset.ba);const c=document.getElementById("bc_"+b.dataset.bid);if(c&&!c.classList.contains("bg-done")){c.classList.add("bg-done");done++;document.getElementById("bdone").textContent=done}});
  document.getElementById("bexit").onclick=()=>renderWork();
  document.getElementById("bfinish").onclick=()=>{renderWork();toast(done?`Отмечено ${done}`:"Готово")}}
function doActSilent(id,act){const l=state.leads.find(x=>x.id===id);if(!l)return;
  if(act==="wrote"){l.status="wrote";l.wroteAt=Date.now();l.call=null;l.deal=null;l.answered=null}
  else if(act==="bad"){l.status="bad";l.badAt=Date.now()}
  else if(act==="nostory"){l.status="nostory";l.nostoryAt=Date.now()}
  save();refresh()}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function renderSettings(){const S=state.settings,body=document.getElementById("settings-body");
  body.innerHTML=`
    <div class="set-block"><h3>Тема</h3><div class="d">Тёмная или светлая. Применяется сразу.</div>
      <div class="seg" style="margin:0"><button data-theme-set="dark" class="${S.theme==='dark'?'active':''}">🌙 Тёмная</button><button data-theme-set="light" class="${S.theme==='light'?'active':''}">☀️ Светлая</button></div></div>
    <div class="set-block"><h3>Шаблоны заходов</h3><div class="d">Заготовки первого сообщения. На карточке лида — кнопка копирования. Добавляй свои.</div>
      <div id="tmpl-list">${(state.templates||[]).map((t,i)=>`<div class="tmpl-item"><div class="txt">${escapeHtml(t)}</div><button class="del" data-deltmpl="${i}">×</button></div>`).join("")||'<div class="d">Пока нет шаблонов.</div>'}</div>
      <div class="tmpl-add"><textarea id="tmpl-new" placeholder="Новый заход — текст сообщения"></textarea><button id="tmpl-save">＋</button></div></div>
    <div class="set-block"><h3>Этапы воронки</h3><div class="d">Включи только нужные этапы. Продаёшь без созвонов — выключи «Созвон».</div>
      <div class="toggle-row"><span>Этап «Ответил / Не ответил»</span><div class="sw ${S.stageAnswered?'on':''}" data-toggle="stageAnswered"><i></i></div></div>
      <div class="toggle-row"><span>Этап «Созвон»</span><div class="sw ${S.stageCall?'on':''}" data-toggle="stageCall"><i></i></div></div></div>
    <div class="set-block"><h3>Вибро-отклик</h3><div class="d">Лёгкая вибрация при свайпе и действиях.</div>
      <div class="toggle-row"><span>Вибрация</span><div class="sw ${S.haptics?'on':''}" data-toggle="haptics"><i></i></div></div></div>
    <div class="set-block"><h3>Валюта</h3><div class="d">Для сумм сделок.</div>
      <div class="seg" style="margin:0">${["₽","$","€","₾","₸"].map(c=>`<button data-cur="${c}" class="${S.currency===c?'active':''}">${c}</button>`).join("")}</div></div>
    <button class="btn btn-sec" id="replay-onb">▶︎ Показать обучение заново</button>`;
  body.querySelectorAll("[data-theme-set]").forEach(b=>b.onclick=()=>{S.theme=b.dataset.themeSet;applyTheme();save();renderSettings()});
  body.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>{S[b.dataset.toggle]=!S[b.dataset.toggle];save();renderSettings();if(b.dataset.toggle==="haptics"&&S.haptics)buzz("light")});
  body.querySelectorAll("[data-cur]").forEach(b=>b.onclick=()=>{S.currency=b.dataset.cur;save();renderSettings()});
  body.querySelectorAll("[data-deltmpl]").forEach(b=>b.onclick=()=>{state.templates.splice(+b.dataset.deltmpl,1);save();renderSettings()});
  const tn=document.getElementById("tmpl-new"),ts=document.getElementById("tmpl-save");
  ts.onclick=()=>{const v=tn.value.trim();if(!v){toast("Пустой шаблон");return}state.templates=state.templates||[];state.templates.push(v);save();renderSettings();toast("Шаблон добавлен")};
  document.getElementById("replay-onb").onclick=()=>{state.onboarded=false;save();startOnboarding()}}
const ONB=[
  {ic:"⚡️",t:'Свайпай <span>лидов</span>',p:"Карточка лида — свайп вправо «написал», влево «не подходит», вверх «нет сторис». Или жми кнопки снизу. Промахнулся — внизу появится «Отмена»."},
  {ic:"📞",t:'Веди <span>воронку</span>',p:"Кому написал — попадает в воронку. Отмечай ответил → созвон → оплату, вписывай сумму сделки и заметки про созвоны."},
  {ic:"🕓",t:'Не теряй <span>сторис</span>',p:"Нет активной сторис? Свайп вверх — лид уходит в папку и через 24ч сам подсветится, чтобы вернуться."},
  {ic:"📊",t:'Считай <span>деньги</span>',p:"Дашборд сам считает конверсию, заработок и воронку за день/неделю/месяц. Отчёт руками больше не пишешь."}];
let onbI=0;
function startOnboarding(){onbI=0;renderOnb()}
function renderOnb(){const s=ONB[onbI],root=document.getElementById("onb-root");
  root.innerHTML=`<div class="onb"><div class="ic">${s.ic}</div><h1>${s.t}</h1><p>${s.p}</p>
    <div class="dots">${ONB.map((_,i)=>`<i class="${i===onbI?'on':''}"></i>`).join("")}</div>
    <div class="navb"><button class="skip" id="onb-skip">Пропустить</button><button class="next" id="onb-next">${onbI<ONB.length-1?"Дальше":"Поехали 🚀"}</button></div></div>`;
  document.getElementById("onb-next").onclick=()=>{buzz("light");if(onbI<ONB.length-1){onbI++;renderOnb()}else finishOnb()};
  document.getElementById("onb-skip").onclick=finishOnb}
function finishOnb(){state.onboarded=true;save();document.getElementById("onb-root").innerHTML=""}
function applyTheme(){document.documentElement.setAttribute("data-theme",state.settings.theme);
  try{const tg=window.Telegram&&window.Telegram.WebApp,c=state.settings.theme==="dark"?"#0c0f14":"#f4f6fa";tg&&tg.setHeaderColor&&tg.setHeaderColor(c);tg&&tg.setBackgroundColor&&tg.setBackgroundColor(c)}catch(e){}}
function refresh(){document.getElementById("today-num").textContent=todayWrote();
  const ready=state.leads.filter(l=>l.status==="nostory"&&(l.nostoryAt+DAY_MS)<=Date.now()).length;
  document.querySelectorAll("nav button").forEach(b=>{let o=b.querySelector(".dot");if(o)o.remove();
    if(b.dataset.tab==="later"&&ready>0){const d=document.createElement("span");d.className="dot";d.textContent=ready;b.appendChild(d)}})}
function show(tab){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+tab).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  if(tab==="work"){batchSession.start=0;renderWork()}if(tab==="funnel")renderFunnel();if(tab==="later")renderLater();if(tab==="dash")renderDash();if(tab==="settings")renderSettings()}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>show(b.dataset.tab));
const li=document.getElementById("load-input");
li.addEventListener("input",()=>{const p=parseLeads(li.value);document.getElementById("load-preview").innerHTML=p.length?`Распознано <b>${p.length}</b>: ${p.slice(0,6).map(h=>"@"+h).join(", ")}${p.length>6?" …":""}`:`Вставь ссылки или @юзернеймы.`});
document.getElementById("load-btn").onclick=()=>{const p=parseLeads(li.value);if(!p.length){toast("Не нашёл ссылок");return}const n=addLeads(p);li.value="";document.getElementById("load-preview").innerHTML="";toast(n?`Добавлено ${n}`+(p.length-n?` · дублей ${p.length-n}`:""):"Все уже в базе");show("work")};
document.getElementById("batch-btn").onclick=startBatch;
document.getElementById("wipe-btn").onclick=()=>{if(confirm("Удалить ВСЮ базу безвозвратно?")){state.leads=[];save();toast("База очищена");show("work")}};
document.querySelectorAll("#funnel-seg button").forEach(b=>b.onclick=()=>{funnelFilter=b.dataset.f;document.querySelectorAll("#funnel-seg button").forEach(x=>x.classList.toggle("active",x===b));renderFunnel()});
document.querySelectorAll("#dash-seg button").forEach(b=>b.onclick=()=>{dashPeriod=b.dataset.p;document.querySelectorAll("#dash-seg button").forEach(x=>x.classList.toggle("active",x===b));renderDash()});
try{const tg=window.Telegram&&window.Telegram.WebApp;if(tg){tg.ready();tg.expand()}}catch(e){}
applyTheme();
if(state.leads.length===0)addLeads(["demo_anna_smm","fit_club_batumi","cold_lead_pro"]);
refresh();renderWork();
if(!state.onboarded)startOnboarding();
</script>

<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Konva</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    /* monochrome graphite base */
    --bg:#0c0c0e;
    --bg2:#0e0e0e;
    --card:rgba(28,28,32,.55);
    --card2:rgba(36,36,42,.5);
    --card3:rgba(48,48,56,.6);
    --line:rgba(255,255,255,.10);
    --line2:rgba(255,255,255,.18);
    --txt:#f5f5f7;
    --txt2:#d4d4d8;
    --muted:#9a9aa2;
    --muted2:#62626c;
    --hi:#ffffff;
    --orange:#ff7a3d;
    --orange2:#ff9a5c;
    --orange-dim:rgba(255,122,61,.18);
    --good:#e8e8e8;
    --bad:#ff5a52;
    --bad-dim:rgba(255,90,82,.16);
    --radius:24px;
    --tap:.2s cubic-bezier(.2,.8,.3,1);
    --spring:.5s cubic-bezier(.22,1.2,.36,1);
    --shadow:0 20px 60px rgba(0,0,0,.5);
    /* liquid glass layers */
    --glass:linear-gradient(150deg,rgba(255,255,255,.13),rgba(255,255,255,.04) 42%,rgba(255,255,255,.02));
    --glass-card:linear-gradient(160deg,rgba(255,255,255,.10),rgba(255,255,255,.025) 50%,rgba(255,255,255,.05));
    --glass-edge:inset 0 1px 0 rgba(255,255,255,.22),inset 0 -1px 0 rgba(255,255,255,.05);
    --blur:blur(26px) saturate(1.7);
    --blur-strong:blur(40px) saturate(1.8);
    --hatch:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(255,255,255,.06) 5px,rgba(255,255,255,.06) 6px);
  }
  html[data-theme="light"]{
    --bg:#dcdce2;--bg2:#f6f6f8;
    --card:rgba(255,255,255,.6);--card2:rgba(255,255,255,.5);--card3:rgba(255,255,255,.75);
    --line:rgba(0,0,0,.08);--line2:rgba(0,0,0,.14);--txt:#0e0e12;--txt2:#2a2a2e;--muted:#6b6b73;--muted2:#a0a0a8;
    --hi:#0e0e12;--shadow:0 20px 60px rgba(40,50,80,.16);
    --glass:linear-gradient(150deg,rgba(255,255,255,.7),rgba(255,255,255,.35) 42%,rgba(255,255,255,.5));
    --glass-card:linear-gradient(160deg,rgba(255,255,255,.75),rgba(255,255,255,.45) 50%,rgba(255,255,255,.6));
    --glass-edge:inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1px 0 rgba(0,0,0,.03);
    --hatch:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(0,0,0,.05) 5px,rgba(0,0,0,.05) 6px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif}
  html,body{height:100%}
  /* living mesh-gradient backdrop — gives glass something to refract */
  body{background:var(--bg);color:var(--txt);overscroll-behavior:none;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:-30%;z-index:-2;pointer-events:none;
    background:
      radial-gradient(40% 35% at 20% 18%,rgba(255,122,61,.20),transparent 60%),
      radial-gradient(45% 40% at 82% 12%,rgba(120,140,255,.16),transparent 62%),
      radial-gradient(50% 45% at 70% 82%,rgba(255,122,61,.14),transparent 60%),
      radial-gradient(45% 45% at 12% 78%,rgba(90,200,255,.12),transparent 62%);
    filter:blur(40px);animation:meshmove 22s ease-in-out infinite alternate}
  html[data-theme="light"] body::before{opacity:.7}
  @keyframes meshmove{0%{transform:translate(0,0) scale(1) rotate(0deg)}50%{transform:translate(3%,-2%) scale(1.08) rotate(4deg)}100%{transform:translate(-2%,3%) scale(1.04) rotate(-3deg)}}
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:rgba(12,12,14,.55)}
  html[data-theme="light"] body::after{background:rgba(220,220,226,.5)}
  #app{max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative}
  /* reusable liquid-glass surface */
  .glass{background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge),var(--shadow);position:relative;overflow:hidden}
  .glass::before{content:"";position:absolute;top:0;left:0;right:0;height:42%;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);pointer-events:none}

  /* header */
  header{padding:18px 20px 8px;display:flex;align-items:center;gap:14px;min-height:64px}
  .back-btn{width:42px;height:42px;flex-shrink:0;border-radius:50%;border:1px solid var(--line2);background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--glass-edge);color:var(--txt);font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--spring)}
  .back-btn:active{transform:scale(.88)}
  .logo{font-weight:900;font-size:26px;letter-spacing:-1.4px;line-height:1;flex:1}
  .page-title{font-weight:800;font-size:22px;letter-spacing:-.8px;flex:1}
  .head-right{display:flex;align-items:center;gap:12px}
  .sync-dot{width:9px;height:9px;border-radius:50%;background:var(--muted2);flex-shrink:0;transition:var(--tap);cursor:pointer}
  .sync-dot.syncing{background:var(--orange);animation:pulse 1s infinite}
  .sync-dot.ok{background:var(--hi)}
  .sync-dot.err{background:var(--bad)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .today-chip{display:flex;align-items:baseline;gap:6px;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);padding:8px 14px;border-radius:999px;cursor:pointer;transition:var(--tap)}
  .today-chip:active{transform:scale(.95)}
  .today-chip .num{font-weight:900;font-size:16px;color:var(--txt);letter-spacing:-.5px}
  .today-chip .lbl{font-size:11px;font-weight:600;color:var(--muted)}

  /* ===== HOME HUB ===== */
  .home-hero{padding:8px 4px 22px}
  .hh-greet{font-size:15px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .hh-stat{font-size:30px;font-weight:800;letter-spacing:-1px;color:var(--txt)}
  .hh-stat b{color:var(--orange)}
  .tile{display:block;width:100%;text-align:left;border:1px solid var(--line2);border-radius:26px;cursor:pointer;
    background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--glass-edge),0 10px 30px rgba(0,0,0,.28);
    transition:var(--spring);position:relative;overflow:hidden;color:var(--txt);padding:22px}
  .tile:active{transform:scale(.97)}
  .tile::before{content:"";position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);pointer-events:none}
  .tile-primary{background:var(--orange);border-color:transparent;color:#fff;margin-bottom:12px;padding:24px;box-shadow:0 14px 40px rgba(255,122,61,.35)}
  .tile-primary .tile-sub{color:rgba(255,255,255,.8)}
  .tile-primary::after{content:"";position:absolute;inset:0;background:var(--hatch);opacity:.18;pointer-events:none}
  .tile-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .tile-ic{font-size:30px;line-height:1;display:block;margin-bottom:14px}
  .tile-primary .tile-ic{margin-bottom:0;font-size:34px}
  .tile-badge{background:rgba(255,255,255,.22);color:#fff;font-size:12px;font-weight:800;padding:7px 14px;border-radius:999px}
  .tile-title{font-size:24px;font-weight:900;letter-spacing:-.8px;line-height:1.05}
  .tile-title.sm{font-size:19px}
  .tile-sub{font-size:13px;color:var(--muted);font-weight:600;margin-top:5px}
  .tile-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .tile-dot{position:absolute;top:20px;right:20px;min-width:24px;height:24px;padding:0 7px;background:var(--orange);color:#fff;font-size:12px;font-weight:800;border-radius:999px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(255,122,61,.5)}
  .home-settings{width:100%;margin-top:6px;background:transparent;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:16px;cursor:pointer;border-radius:18px;transition:var(--tap)}
  .home-settings:active{background:var(--card)}

  main{flex:1;padding:0 16px 50px}
  .screen{display:none}
  .screen.active{display:block;animation:glassIn .5s cubic-bezier(.22,1,.36,1)}
  @keyframes glassIn{from{opacity:0;transform:translateY(16px) scale(.98);filter:blur(4px)}to{opacity:1;transform:none;filter:none}}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .h2{font-size:30px;font-weight:900;margin:12px 2px 2px;letter-spacing:-1.4px;line-height:1.02}
  .sub{font-size:13px;color:var(--muted);margin:8px 2px 18px;line-height:1.5;font-weight:500;max-width:330px}

  /* progress */
  .qprog{margin:6px 4px 16px}
  .qprog .bar{height:7px;background:var(--card3);border-radius:99px;overflow:hidden}
  .qprog .bar i{display:block;height:100%;background:var(--hi);border-radius:99px;transition:width .45s cubic-bezier(.3,.9,.3,1)}
  .qprog .lbl{display:flex;justify-content:space-between;font-size:10.5px;font-weight:700;color:var(--muted2);margin-top:7px;letter-spacing:.2px}

  /* swipe */
  .hint-row{display:flex;justify-content:space-between;margin:0 8px 12px;font-size:10.5px;font-weight:800;letter-spacing:.2px;text-transform:uppercase}
  .hint-row .l{color:var(--bad)}.hint-row .r{color:var(--txt)}.hint-row .u{color:var(--orange)}
  .swipe-wrap{position:relative;height:404px;margin-top:14px;touch-action:pan-y}
  .swipe-card{position:absolute;inset:0;background:var(--glass-card);border:1px solid var(--line2);border-radius:32px;padding:30px 24px;text-align:center;box-shadow:var(--glass-edge),var(--shadow);display:flex;flex-direction:column;justify-content:center;will-change:transform;user-select:none;backdrop-filter:var(--blur-strong);-webkit-backdrop-filter:var(--blur-strong);overflow:hidden}
  .swipe-card.behind{transform:scale(.92) translateY(18px);opacity:.45;filter:saturate(.5)}
  .qcount{font-size:10.5px;color:var(--muted);font-weight:800;letter-spacing:1px;margin-bottom:18px;text-transform:uppercase}
  .qcount b{color:var(--txt)}
  .avatar{width:104px;height:104px;border-radius:50%;margin:0 auto 18px;background:var(--hi);display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:900;color:var(--bg);box-shadow:0 14px 36px rgba(0,0,0,.4)}
  .handle{font-size:27px;font-weight:900;letter-spacing:-.8px;word-break:break-all;line-height:1.05}
  .added-ago{font-size:11px;color:var(--muted2);font-weight:600;margin-top:8px;letter-spacing:.2px}
  .openlink{display:inline-flex;align-items:center;gap:8px;margin-top:20px;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);color:var(--txt);padding:13px 22px;border-radius:999px;font-size:13.5px;font-weight:700;text-decoration:none;transition:var(--tap)}
  .openlink:active{transform:scale(.95)}
  .tmpl-chip{margin-top:13px;display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
  .tmpl-chip button{background:transparent;color:var(--txt2);border:1px solid var(--line2);font-size:11.5px;font-weight:700;padding:9px 14px;border-radius:999px;cursor:pointer;transition:var(--tap)}
  .tmpl-chip button:active{transform:scale(.93);background:var(--card3)}
  .swipe-badge{position:absolute;top:26px;padding:9px 17px;border-radius:999px;font-weight:900;font-size:14px;letter-spacing:.6px;opacity:0;border:2px solid;text-transform:uppercase}
  .swipe-badge.left{right:24px;color:var(--bad);border-color:var(--bad);background:var(--bad-dim);transform:rotate(11deg) scale(.8)}
  .swipe-badge.right{left:24px;color:var(--txt);border-color:var(--txt);background:rgba(255,255,255,.1);transform:rotate(-11deg) scale(.8)}
  .swipe-badge.up{left:50%;margin-left:-58px;top:auto;bottom:30px;color:var(--orange);border-color:var(--orange);background:var(--orange-dim)}

  /* tap actions — primary white, secondaries outlined */
  .tap-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .ta{border:none;border-radius:18px;padding:16px 8px;font-size:13px;font-weight:800;cursor:pointer;transition:var(--spring);display:flex;align-items:center;justify-content:center;gap:8px}
  .ta:active{transform:scale(.92)}.ta .ic{font-size:17px}
  .ta.wrote{background:var(--hi);color:var(--bg);grid-column:1 / -1;padding:18px;font-size:15px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.5)}
  .ta.bad{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);color:var(--bad);border:1px solid var(--line2);box-shadow:var(--glass-edge)}
  .ta.story{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);color:var(--orange);border:1px solid var(--line2);box-shadow:var(--glass-edge)}
  .skip-btn{width:100%;margin-top:10px;background:transparent;border:none;color:var(--muted2);font-size:12px;font-weight:700;padding:11px;cursor:pointer;transition:var(--tap);letter-spacing:.2px}
  .skip-btn:active{color:var(--txt)}

  .empty{text-align:center;padding:70px 24px;color:var(--muted)}
  .empty .big{font-size:50px;margin-bottom:16px;filter:grayscale(1)}
  .empty p{font-size:14px;line-height:1.65;font-weight:500}
  .empty .cta{margin-top:20px;display:inline-block;background:var(--hi);color:var(--bg);font-weight:800;padding:15px 28px;border-radius:999px;font-size:14px;border:none;cursor:pointer}

  .card{background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge),0 10px 30px rgba(0,0,0,.3);border-radius:var(--radius);padding:16px;margin-bottom:11px}
  .row{background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge),0 10px 30px rgba(0,0,0,.3);border-radius:18px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:13px}
  .row .h{font-weight:700;font-size:14px;flex:1;word-break:break-all}
  .ig{color:var(--muted);text-decoration:none;font-size:18px;flex-shrink:0;width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:var(--card3);border-radius:50%}
  .pill{font-size:10px;font-weight:800;padding:5px 11px;border-radius:999px;white-space:nowrap;letter-spacing:.4px;text-transform:uppercase}
  .pill.ans{background:var(--card3);color:var(--txt2)}
  .pill.call{background:var(--orange-dim);color:var(--orange)}
  .pill.won{background:var(--hi);color:var(--bg)}
  .pill.lost{background:var(--bad-dim);color:var(--bad)}

  .fcard{background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge),0 10px 30px rgba(0,0,0,.3);border-radius:var(--radius);padding:18px;margin-bottom:12px}
  .fcard .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .stage-label{font-size:10px;color:var(--muted2);margin:16px 0 8px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
  .funnel-actions{display:flex;gap:8px;flex-wrap:wrap}
  .mini{border:1.5px solid var(--line2);background:transparent;color:var(--txt2);font-size:12px;font-weight:700;padding:10px 15px;border-radius:999px;cursor:pointer;transition:var(--tap)}
  .mini:active{transform:scale(.93)}
  .mini.on-ans{background:var(--txt2);color:var(--bg);border-color:var(--txt2)}
  .mini.on-call{background:var(--orange);color:#fff;border-color:var(--orange)}
  .mini.on-won{background:var(--hi);color:var(--bg);border-color:var(--hi)}
  .mini.on-lost{background:var(--bad);color:#fff;border-color:var(--bad)}
  .amount-box{margin-top:12px;display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--line2);border-radius:16px;padding:12px 15px}
  .amount-box label{font-size:12px;font-weight:800;color:var(--txt)}
  .amount-box input{flex:1;background:transparent;border:none;color:var(--txt);font-size:18px;font-weight:900;text-align:right;outline:none;font-family:inherit;letter-spacing:-.5px}
  .amount-box .cur{font-size:14px;font-weight:800;color:var(--muted)}
  .note-box{margin-top:12px}
  .note-input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:14px;color:var(--txt);padding:12px 14px;font-size:13px;font-weight:500;resize:none;min-height:44px;font-family:inherit}
  .note-input:focus{outline:none;border-color:var(--orange)}
  .note-saved{font-size:11px;color:var(--orange);font-weight:700;margin-top:7px}
  .timer{font-size:11px;color:var(--orange);font-weight:700}.timer.ready{color:var(--txt)}

  textarea.load{width:100%;min-height:160px;background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);border-radius:var(--radius);color:var(--txt);padding:16px;font-size:14px;resize:vertical;line-height:1.55;font-weight:500;font-family:inherit}
  textarea.load:focus{outline:none;border-color:var(--hi)}
  .btn{width:100%;border:none;border-radius:999px;padding:17px;font-size:15px;font-weight:800;cursor:pointer;transition:var(--spring)}
  .btn:active{transform:scale(.95)}
  .btn-primary{background:var(--hi);color:var(--bg);margin-top:14px;box-shadow:0 8px 24px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.5)}
  .btn-sec{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);color:var(--txt);border:1px solid var(--line2);box-shadow:var(--glass-edge);margin-top:11px}
  .preview{margin-top:14px;font-size:12px;color:var(--muted);font-weight:600;line-height:1.5}
  .preview b{color:var(--txt)}
  .danger{color:var(--bad);font-size:12px;text-align:center;width:100%;background:transparent;border:none;margin-top:26px;cursor:pointer;font-weight:700}

  .batch-bar{background:var(--hi);color:var(--bg);border-radius:18px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;font-weight:800;font-size:13px}
  .batch-bar button{background:rgba(0,0,0,.12);border:none;color:var(--bg);font-weight:800;padding:8px 14px;border-radius:999px;font-size:12px;cursor:pointer}
  .batch-grid{display:flex;gap:7px;margin-top:11px}
  .bg-btn{flex:1;border:1.5px solid var(--line2);background:transparent;border-radius:999px;padding:11px 4px;font-size:11.5px;font-weight:800;cursor:pointer;transition:var(--tap)}
  .bg-btn:active{transform:scale(.93)}
  .bg-btn.w{background:var(--hi);color:var(--bg);border-color:var(--hi)}.bg-btn.s{color:var(--orange)}.bg-btn.b{color:var(--bad)}
  .bg-done{opacity:.35}
  .bopen{display:block;text-align:center;background:var(--card3);border:1px solid var(--line2);color:var(--txt);padding:12px;border-radius:999px;font-weight:700;font-size:13px;text-decoration:none;margin-bottom:9px}

  .seg{display:flex;background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge),0 10px 30px rgba(0,0,0,.3);border-radius:999px;padding:4px;margin-bottom:16px;gap:2px}
  .seg button{flex:1;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:700;padding:11px;border-radius:999px;cursor:pointer;transition:var(--tap)}
  .seg button.active{background:var(--hi);color:var(--bg)}

  /* dashboard */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .kpi{background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge),0 10px 30px rgba(0,0,0,.3);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
  .kpi .n{font-size:34px;font-weight:900;letter-spacing:-2px;line-height:.95}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:8px;font-weight:600}
  .kpi.hero{grid-column:1 / -1;background:var(--hi);color:var(--bg)}
  .kpi.hero .n{font-size:42px}.kpi.hero .l{color:rgba(0,0,0,.55)}
  .kpi.hero::after{content:"";position:absolute;inset:0;background:var(--hatch);opacity:.4;mix-blend-mode:multiply;pointer-events:none}
  .kpi.orange .n{color:var(--orange)}

function initSwipe(l){const card=document.getElementById("topcard");if(!card)return;

  const onMove=e=>{if(!drag)return;const p=e.touches?e.touches[0]:e;dx=p.clientX-sx;dy=p.clientY-sy;const horiz=Math.abs(dx)>Math.abs(dy);

function shareImage(blob,fname,caption){

}

    <button class="home-settings" data-go="settings">⚙️ Настройки и команда</button>`;
  body.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{buzz("light");show(b.dataset.go)});
}
const li=document.getElementById("load-input");
li.addEventListener("input",()=>{const p=parseLeads(li.value);document.getElementById("load-preview").innerHTML=p.length?`Распознано <b>${p.length}</b>: ${p.slice(0,6).map(h=>"@"+h).join(", ")}${p.length>6?" …":""}`:`Вставь ссылки или @юзернеймы.`});
document.getElementById("load-btn").onclick=()=>{const p=parseLeads(li.value);if(!p.length){toast("Не нашёл ссылок");return}const n=addLeads(p);li.value="";document.getElementById("load-preview").innerHTML="";toast(n?`Добавлено ${n}`+(p.length-n?` · дублей ${p.length-n}`:""):"Все уже в базе");show("work")};
document.getElementById("batch-btn").onclick=startBatch;
document.getElementById("wipe-btn").onclick=()=>{if(confirm("Удалить ВСЮ базу безвозвратно?")){state.leads=[];save();if(CLOUD_READY&&TG_ID){sbDelete("konva_leads","tg_id=eq."+encodeURIComponent(TG_ID)).catch(e=>console.warn("cloud wipe",e))}toast("База очищена");show("work")}};
document.querySelectorAll("#funnel-seg button").forEach(b=>b.onclick=()=>{funnelFilter=b.dataset.f;document.querySelectorAll("#funnel-seg button").forEach(x=>x.classList.toggle("active",x===b));renderFunnel()});
document.querySelectorAll("#dash-seg button").forEach(b=>b.onclick=()=>{dashPeriod=b.dataset.p;document.querySelectorAll("#dash-seg button").forEach(x=>x.classList.toggle("active",x===b));renderDash()});
try{const tg=window.Telegram&&window.Telegram.WebApp;if(tg){tg.ready();tg.expand()}}catch(e){}
applyTheme();

/* ===== BOOT: local first, then cloud sync ===== */
MY_CODE=codeFromId(rawTgId()); // unique per telegram user
TG_ID=getTgId();
// manual re-pull on tapping the sync dot
(function(){const d=document.getElementById("today-chip");if(d)d.onclick=async()=>{if(!TG_ID)return;setSyncDot("syncing");try{const cloud=await cloudPull();state.leads=mergeStates(state.leads,cloud.leads);if(cloud.settings){if(cloud.settings.templates)state.templates=cloud.settings.templates;if(cloud.settings.settings)state.settings=Object.assign({},DEFAULTS.settings,cloud.settings.settings)}localStorage.setItem(KEY,JSON.stringify(state));setSyncDot("ok");applyTheme();const a=document.querySelector(".screen.active"),tab=a?a.id.replace("screen-",""):"work";show(tab);refresh();toast("Обновлено из облака")}catch(e){setSyncDot("err");toast("Нет связи с облаком")}}})();
// 1. paint local immediately so app feels instant
refresh();show("home");
if(!state.onboarded)startOnboarding();
// 2. then reconcile with cloud
(async function cloudBoot(){
  setSyncDot("syncing");
  try{
    await migrateLegacyToCode();
    const cloud=await cloudPull();
    // merge leads (local + cloud, newest wins)
    const merged=mergeStates(state.leads,cloud.leads);
    state.leads=merged;
    // settings: cloud wins if present (so theme/templates follow you across devices)
    if(cloud.settings){
      if(cloud.settings.templates)state.templates=cloud.settings.templates;
      if(cloud.settings.settings)state.settings=Object.assign({},DEFAULTS.settings,cloud.settings.settings);
      if(typeof cloud.settings.onboarded==="boolean")state.onboarded=cloud.settings.onboarded;
    }
    localStorage.setItem(KEY,JSON.stringify(state));
    CLOUD_READY=true;
    // push merged result back up so cloud has the union
    await cloudPushAll();
    setSyncDot("ok");
    applyTheme();
    // repaint whatever screen is active
    const active=document.querySelector(".screen.active");
    const tab=active?active.id.replace("screen-",""):"home";
    if(tab==="home")renderHome();else if(tab==="work")renderWork();else if(tab==="funnel")renderFunnel();else if(tab==="later")renderLater();else if(tab==="dash")renderDash();else if(tab==="settings")renderSettings();
    refresh();
  }catch(e){
    console.warn("cloud boot failed, staying local:",e);
    CLOUD_READY=true; // still allow future pushes to retry
    setSyncDot("err");
  }
})();

</script>

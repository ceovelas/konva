<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Konva</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    /* monochrome graphite base — from Opal / Proton Pass */
    --bg:#161616;
    --bg2:#0e0e0e;
    --card:#0f0f0f;
    --card2:#1c1c1c;
    --card3:#262626;
    --line:rgba(255,255,255,.07);
    --line2:rgba(255,255,255,.14);
    --txt:#f5f5f5;
    --txt2:#d4d4d4;
    --muted:#8c8c8c;
    --muted2:#5c5c5c;
    /* white is the primary action accent (Opal "Save") */
    --hi:#ffffff;
    /* orange + hatch only in data viz (Figma Charts ref) */
    --orange:#e8632a;
    --orange2:#ff7a3d;
    --orange-dim:rgba(232,99,42,.16);
    --good:#e8e8e8;
    --bad:#ff5a52;
    --bad-dim:rgba(255,90,82,.14);
    --radius:22px;
    --tap:.16s cubic-bezier(.2,.8,.3,1);
    --shadow:0 18px 50px rgba(0,0,0,.55);
    --glass:linear-gradient(168deg,rgba(40,40,40,.9),rgba(14,14,14,.92));
    --hatch:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(255,255,255,.06) 5px,rgba(255,255,255,.06) 6px);
  }
  html[data-theme="light"]{
    --bg:#e9e9ec;--bg2:#f6f6f8;--card:#ffffff;--card2:#f3f3f5;--card3:#e8e8ec;
    --line:rgba(0,0,0,.07);--line2:rgba(0,0,0,.13);--txt:#101012;--txt2:#2a2a2e;--muted:#75757c;--muted2:#a6a6ad;
    --hi:#101012;--shadow:0 18px 50px rgba(40,40,55,.14);
    --glass:linear-gradient(168deg,#ffffff,#f4f4f6);
    --hatch:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(0,0,0,.05) 5px,rgba(0,0,0,.05) 6px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);overscroll-behavior:none;transition:background .3s;-webkit-font-smoothing:antialiased}
  #app{max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative}

  /* header */
  header{padding:22px 22px 10px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-weight:900;font-size:26px;letter-spacing:-1.4px;line-height:1}
  .head-right{display:flex;align-items:center;gap:12px}
  .sync-dot{width:9px;height:9px;border-radius:50%;background:var(--muted2);flex-shrink:0;transition:var(--tap);cursor:pointer}
  .sync-dot.syncing{background:var(--orange);animation:pulse 1s infinite}
  .sync-dot.ok{background:var(--hi)}
  .sync-dot.err{background:var(--bad)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .today-chip{display:flex;align-items:baseline;gap:6px;background:var(--card2);border:1px solid var(--line);padding:8px 14px;border-radius:999px}
  .today-chip .num{font-weight:900;font-size:16px;color:var(--txt);letter-spacing:-.5px}
  .today-chip .lbl{font-size:11px;font-weight:600;color:var(--muted)}

  /* nav — pill segmented, white active like Opal */
  nav{display:flex;gap:3px;padding:6px 12px 14px;position:sticky;top:0;background:linear-gradient(var(--bg),var(--bg) 72%,transparent);z-index:8}
  nav button{flex:1;background:transparent;border:none;color:var(--muted2);font-size:9.5px;font-weight:700;padding:9px 1px;border-radius:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:var(--tap);position:relative;letter-spacing:.2px}
  nav button .ic{font-size:17px;line-height:1;transition:var(--tap);filter:grayscale(1) opacity(.55)}
  nav button.active{color:var(--bg);background:var(--hi)}
  nav button.active .ic{filter:none}
  nav button .dot{position:absolute;top:3px;right:calc(50% - 17px);min-width:15px;height:15px;padding:0 3px;background:var(--orange);color:#fff;font-size:9px;font-weight:800;border-radius:99px;display:flex;align-items:center;justify-content:center}

  main{flex:1;padding:0 16px 130px}
  .screen{display:none}
  .screen.active{display:block;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .h2{font-size:30px;font-weight:900;margin:12px 2px 2px;letter-spacing:-1.4px;line-height:1.02}
  .sub{font-size:13px;color:var(--muted);margin:8px 2px 18px;line-height:1.5;font-weight:500;max-width:330px}

  /* progress */
  .qprog{margin:6px 4px 16px}
  .qprog .bar{height:7px;background:var(--card3);border-radius:99px;overflow:hidden}
  .qprog .bar i{display:block;height:100%;background:var(--hi);border-radius:99px;transition:width .45s cubic-bezier(.3,.9,.3,1)}
  .qprog .lbl{display:flex;justify-content:space-between;font-size:10.5px;font-weight:700;color:var(--muted2);margin-top:7px;letter-spacing:.2px}

  /* swipe */
  .hint-row{display:flex;justify-content:space-between;margin:0 8px 12px;font-size:10.5px;font-weight:800;letter-spacing:.2px;text-transform:uppercase}
  .hint-row .l{color:var(--bad)}.hint-row .r{color:var(--txt)}.hint-row .u{color:var(--orange)}
  .swipe-wrap{position:relative;height:404px;margin-top:14px;touch-action:pan-y}
  .swipe-card{position:absolute;inset:0;background:var(--glass);border:1px solid var(--line2);border-radius:30px;padding:30px 24px;text-align:center;box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:center;will-change:transform;user-select:none;backdrop-filter:blur(20px)}
  .swipe-card.behind{transform:scale(.92) translateY(18px);opacity:.45;filter:saturate(.5)}
  .qcount{font-size:10.5px;color:var(--muted);font-weight:800;letter-spacing:1px;margin-bottom:18px;text-transform:uppercase}
  .qcount b{color:var(--txt)}
  .avatar{width:104px;height:104px;border-radius:50%;margin:0 auto 18px;background:var(--hi);display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:900;color:var(--bg);box-shadow:0 14px 36px rgba(0,0,0,.4)}
  .handle{font-size:27px;font-weight:900;letter-spacing:-.8px;word-break:break-all;line-height:1.05}
  .added-ago{font-size:11px;color:var(--muted2);font-weight:600;margin-top:8px;letter-spacing:.2px}
  .openlink{display:inline-flex;align-items:center;gap:8px;margin-top:20px;background:var(--card3);border:1px solid var(--line2);color:var(--txt);padding:13px 22px;border-radius:999px;font-size:13.5px;font-weight:700;text-decoration:none;transition:var(--tap)}
  .openlink:active{transform:scale(.95)}
  .tmpl-chip{margin-top:13px;display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
  .tmpl-chip button{background:transparent;color:var(--txt2);border:1px solid var(--line2);font-size:11.5px;font-weight:700;padding:9px 14px;border-radius:999px;cursor:pointer;transition:var(--tap)}
  .tmpl-chip button:active{transform:scale(.93);background:var(--card3)}
  .swipe-badge{position:absolute;top:26px;padding:9px 17px;border-radius:999px;font-weight:900;font-size:14px;letter-spacing:.6px;opacity:0;border:2px solid;text-transform:uppercase}
  .swipe-badge.left{right:24px;color:var(--bad);border-color:var(--bad);background:var(--bad-dim);transform:rotate(11deg) scale(.8)}
  .swipe-badge.right{left:24px;color:var(--txt);border-color:var(--txt);background:rgba(255,255,255,.1);transform:rotate(-11deg) scale(.8)}
  .swipe-badge.up{left:50%;margin-left:-58px;top:auto;bottom:30px;color:var(--orange);border-color:var(--orange);background:var(--orange-dim)}

  /* tap actions — primary white, secondaries outlined */
  .tap-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .ta{border:none;border-radius:18px;padding:16px 8px;font-size:13px;font-weight:800;cursor:pointer;transition:var(--tap);display:flex;align-items:center;justify-content:center;gap:8px}
  .ta:active{transform:scale(.95)}.ta .ic{font-size:17px}
  .ta.wrote{background:var(--hi);color:var(--bg);grid-column:1 / -1;padding:18px;font-size:15px;border-radius:999px}
  .ta.bad{background:transparent;color:var(--bad);border:1.5px solid var(--line2)}
  .ta.story{background:transparent;color:var(--orange);border:1.5px solid var(--line2)}
  .skip-btn{width:100%;margin-top:10px;background:transparent;border:none;color:var(--muted2);font-size:12px;font-weight:700;padding:11px;cursor:pointer;transition:var(--tap);letter-spacing:.2px}
  .skip-btn:active{color:var(--txt)}

  .empty{text-align:center;padding:70px 24px;color:var(--muted)}
  .empty .big{font-size:50px;margin-bottom:16px;filter:grayscale(1)}
  .empty p{font-size:14px;line-height:1.65;font-weight:500}
  .empty .cta{margin-top:20px;display:inline-block;background:var(--hi);color:var(--bg);font-weight:800;padding:15px 28px;border-radius:999px;font-size:14px;border:none;cursor:pointer}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:11px}
  .row{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:13px}
  .row .h{font-weight:700;font-size:14px;flex:1;word-break:break-all}
  .ig{color:var(--muted);text-decoration:none;font-size:18px;flex-shrink:0;width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:var(--card3);border-radius:50%}
  .pill{font-size:10px;font-weight:800;padding:5px 11px;border-radius:999px;white-space:nowrap;letter-spacing:.4px;text-transform:uppercase}
  .pill.ans{background:var(--card3);color:var(--txt2)}
  .pill.call{background:var(--orange-dim);color:var(--orange)}
  .pill.won{background:var(--hi);color:var(--bg)}
  .pill.lost{background:var(--bad-dim);color:var(--bad)}

  .fcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:12px}
  .fcard .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .stage-label{font-size:10px;color:var(--muted2);margin:16px 0 8px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
  .funnel-actions{display:flex;gap:8px;flex-wrap:wrap}
  .mini{border:1.5px solid var(--line2);background:transparent;color:var(--txt2);font-size:12px;font-weight:700;padding:10px 15px;border-radius:999px;cursor:pointer;transition:var(--tap)}
  .mini:active{transform:scale(.93)}
  .mini.on-ans{background:var(--txt2);color:var(--bg);border-color:var(--txt2)}
  .mini.on-call{background:var(--orange);color:#fff;border-color:var(--orange)}
  .mini.on-won{background:var(--hi);color:var(--bg);border-color:var(--hi)}
  .mini.on-lost{background:var(--bad);color:#fff;border-color:var(--bad)}
  .amount-box{margin-top:12px;display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--line2);border-radius:16px;padding:12px 15px}
  .amount-box label{font-size:12px;font-weight:800;color:var(--txt)}
  .amount-box input{flex:1;background:transparent;border:none;color:var(--txt);font-size:18px;font-weight:900;text-align:right;outline:none;font-family:inherit;letter-spacing:-.5px}
  .amount-box .cur{font-size:14px;font-weight:800;color:var(--muted)}
  .note-box{margin-top:12px}
  .note-input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:14px;color:var(--txt);padding:12px 14px;font-size:13px;font-weight:500;resize:none;min-height:44px;font-family:inherit}
  .note-input:focus{outline:none;border-color:var(--orange)}
  .note-saved{font-size:11px;color:var(--orange);font-weight:700;margin-top:7px}
  .timer{font-size:11px;color:var(--orange);font-weight:700}.timer.ready{color:var(--txt)}

  textarea.load{width:100%;min-height:160px;background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);color:var(--txt);padding:16px;font-size:14px;resize:vertical;line-height:1.55;font-weight:500;font-family:inherit}
  textarea.load:focus{outline:none;border-color:var(--hi)}
  .btn{width:100%;border:none;border-radius:999px;padding:17px;font-size:15px;font-weight:800;cursor:pointer;transition:var(--tap)}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--hi);color:var(--bg);margin-top:14px}
  .btn-sec{background:transparent;color:var(--txt);border:1.5px solid var(--line2);margin-top:11px}
  .preview{margin-top:14px;font-size:12px;color:var(--muted);font-weight:600;line-height:1.5}
  .preview b{color:var(--txt)}
  .danger{color:var(--bad);font-size:12px;text-align:center;width:100%;background:transparent;border:none;margin-top:26px;cursor:pointer;font-weight:700}

  .batch-bar{background:var(--hi);color:var(--bg);border-radius:18px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;font-weight:800;font-size:13px}
  .batch-bar button{background:rgba(0,0,0,.12);border:none;color:var(--bg);font-weight:800;padding:8px 14px;border-radius:999px;font-size:12px;cursor:pointer}
  .batch-grid{display:flex;gap:7px;margin-top:11px}
  .bg-btn{flex:1;border:1.5px solid var(--line2);background:transparent;border-radius:999px;padding:11px 4px;font-size:11.5px;font-weight:800;cursor:pointer;transition:var(--tap)}
  .bg-btn:active{transform:scale(.93)}
  .bg-btn.w{background:var(--hi);color:var(--bg);border-color:var(--hi)}.bg-btn.s{color:var(--orange)}.bg-btn.b{color:var(--bad)}
  .bg-done{opacity:.35}
  .bopen{display:block;text-align:center;background:var(--card3);border:1px solid var(--line2);color:var(--txt);padding:12px;border-radius:999px;font-weight:700;font-size:13px;text-decoration:none;margin-bottom:9px}

  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px;margin-bottom:16px;gap:2px}
  .seg button{flex:1;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:700;padding:11px;border-radius:999px;cursor:pointer;transition:var(--tap)}
  .seg button.active{background:var(--hi);color:var(--bg)}

  /* dashboard */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
  .kpi .n{font-size:34px;font-weight:900;letter-spacing:-2px;line-height:.95}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:8px;font-weight:600}
  .kpi.hero{grid-column:1 / -1;background:var(--hi);color:var(--bg)}
  .kpi.hero .n{font-size:42px}.kpi.hero .l{color:rgba(0,0,0,.55)}
  .kpi.hero::after{content:"";position:absolute;inset:0;background:var(--hatch);opacity:.4;mix-blend-mode:multiply;pointer-events:none}
  .kpi.orange .n{color:var(--orange)}

  .conv-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:11px}
  .conv-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:9px}
  .conv-row b{color:var(--txt);font-size:14px;font-weight:800}
  .conv-row .pct{color:var(--txt);font-weight:900;font-size:15px}
  .track{height:10px;background:var(--card3);border-radius:99px;overflow:hidden;margin-bottom:17px;position:relative}
  .track:last-child{margin-bottom:0}
  .track i{display:block;height:100%;border-radius:99px;transition:width .6s cubic-bezier(.3,.9,.3,1)}
  .track i.g{background:var(--hi)}
  .track i.w{background:var(--orange)}
  .track i.b{background:var(--txt2)}

  /* funnel viz — orange bars + hatch remainder */
  .vfunnel{margin-top:8px}
  .vstep{margin-bottom:11px}
  .vstep .vlbl{display:flex;justify-content:space-between;font-size:12px;font-weight:800;margin-bottom:6px}
  .vstep .vlbl .vn{color:var(--txt)}.vstep .vlbl .vp{color:var(--muted);font-size:11px;font-weight:600}
  .vtrack{height:40px;border-radius:12px;background:var(--hatch),var(--card3);overflow:hidden;position:relative}
  .vbar{height:100%;border-radius:12px;display:flex;align-items:center;padding-left:14px;font-weight:900;font-size:15px;min-width:42px;transition:width .7s cubic-bezier(.3,.9,.3,1)}

  .chart-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 16px 13px;margin-top:11px}
  .chart-title{font-size:13px;font-weight:800;margin:0 2px 16px;display:flex;align-items:center;justify-content:space-between;letter-spacing:-.2px}
  .chart-title span{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  svg.chart{width:100%;display:block;overflow:visible}
  .bar-lbl{font-size:9px;fill:var(--muted2);font-weight:700}.bar-val{font-size:10px;fill:var(--txt);font-weight:800}

  .cmp{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:9px}
  .cmp .col{text-align:center}.cmp .col .cn{font-size:30px;font-weight:900;letter-spacing:-1.5px}
  .cmp .col .cl{font-size:9.5px;color:var(--muted2);font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin-top:4px}
  .cmp .arrow{font-size:12px;font-weight:900;padding:6px 11px;border-radius:999px}
  .cmp .arrow.up{background:var(--hi);color:var(--bg)}.cmp .arrow.down{background:var(--bad-dim);color:var(--bad)}.cmp .arrow.flat{background:var(--card3);color:var(--muted)}
  .cmp-now .cn{color:var(--txt)}.cmp-prev .cn{color:var(--muted2)}
  .cmp-title{font-size:10.5px;font-weight:800;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin:20px 4px 2px}

  .set-block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:13px}
  .set-block h3{font-size:16px;font-weight:900;margin-bottom:5px;letter-spacing:-.5px}
  .set-block .d{font-size:11.5px;color:var(--muted);font-weight:500;margin-bottom:14px;line-height:1.5}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--line)}
  .toggle-row:first-of-type{border-top:none}
  .toggle-row span{font-size:13.5px;font-weight:600}
  .sw{width:48px;height:28px;background:var(--card3);border-radius:99px;position:relative;cursor:pointer;transition:var(--tap);flex-shrink:0}
  .sw.on{background:var(--hi)}
  .sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;background:var(--bg);border-radius:50%;transition:var(--tap)}
  html[data-theme="light"] .sw i{background:#fff}
  html[data-theme="light"] .sw.on i{background:var(--bg)}
  .sw.on i{left:23px;background:var(--bg)}
  html[data-theme="dark"] .sw i{background:#fff}
  .tmpl-item{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:9px;display:flex;gap:10px;align-items:flex-start}
  .tmpl-item .txt{flex:1;font-size:13px;font-weight:500;line-height:1.45;word-break:break-word}
  .tmpl-item .del{background:transparent;color:var(--bad);border:1px solid var(--line2);width:30px;height:30px;border-radius:50%;font-weight:900;cursor:pointer;flex-shrink:0;font-size:16px}
  .tmpl-add{display:flex;gap:8px;margin-top:6px}
  .tmpl-add textarea{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:14px;color:var(--txt);padding:11px 13px;font-size:13px;font-weight:500;resize:none;min-height:42px;font-family:inherit}
  .tmpl-add textarea:focus{outline:none;border-color:var(--hi)}
  .tmpl-add button{background:var(--hi);color:var(--bg);border:none;border-radius:14px;font-weight:900;padding:0 20px;cursor:pointer;font-size:18px}

  .onb{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 30px;text-align:center}
  .onb .ic{width:96px;height:96px;border-radius:50%;background:var(--hi);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:46px;margin-bottom:30px;animation:pop .45s cubic-bezier(.3,1.4,.5,1)}
  @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  .onb h1{font-size:32px;font-weight:900;letter-spacing:-1.4px;margin-bottom:16px;line-height:1.05}
  .onb h1 span{color:var(--orange)}
  .onb p{font-size:15.5px;color:var(--muted);font-weight:500;line-height:1.6;max-width:330px;margin-bottom:8px}
  .onb .dots{display:flex;gap:8px;margin:32px 0}

function codeFromId(id){
  const ALPH="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 32 chars, no 0/O/1/I

  let h1=0x811c9dc5,h2=0x1505;
  for(let i=0;i<id.length;i++){const c=id.charCodeAt(i);h1=(h1^c)*0x01000193>>>0;h2=((h2<<5)+h2+c)>>>0;}

  let out="";let n=BigInt(h1)*0x100000000n+BigInt(h2);
  for(let i=0;i<6;i++){out+=ALPH[Number(n%32n)];n=n/32n;}
  return "KONVA-"+out;
}

async function partnerPush(code,handles){

  if(tgt===MY_CODE)throw new Error("own_code");

  const fresh=rows.filter(r=>!have.has(r.handle));
  if(fresh.length)await sbUpsert("konva_leads",fresh,"id");

}

    ps.textContent="Отправить лиды партнеру";ps.disabled=false;
  };
  body.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>{S[b.dataset.toggle]=!S[b.dataset.toggle];save();renderSettings();if(b.dataset.toggle==="haptics"&&S.haptics)buzz("light")});
  body.querySelectorAll("[data-cur]").forEach(b=>b.onclick=()=>{S.currency=b.dataset.cur;save();renderSettings()});
  body.querySelectorAll("[data-deltmpl]").forEach(b=>b.onclick=()=>{state.templates.splice(+b.dataset.deltmpl,1);save();renderSettings()});
  const tn=document.getElementById("tmpl-new"),ts=document.getElementById("tmpl-save");
  ts.onclick=()=>{const v=tn.value.trim();if(!v){toast("Пустой шаблон");return}state.templates=state.templates||[];state.templates.push(v);save();renderSettings();toast("Шаблон добавлен")};
  document.getElementById("replay-onb").onclick=()=>{state.onboarded=false;save();startOnboarding()}}
const ONB=[
  {ic:"⚡️",t:'Свайпай <span>лидов</span>',p:"Карточка лида - свайп вправо «написал», влево «не подходит», вверх «нет сторис». Или жми кнопки снизу. Если захочешь отменеить действие - внизу появится «Отмена»."},
  {ic:"📞",t:'Веди <span>воронку</span>',p:"Кому написал - попадает в воронку. Отмечай ответил → созвон → оплату, вписывай сумму сделки и заметки про созвоны."},
  {ic:"🕓",t:'Не теряй <span>сторис</span>',p:"Нет активной сторис? Свайп вверх - лид уходит в папку и через 24ч сам подсветится, чтобы вернуться."},
  {ic:"📊",t:'Считай <span>деньги</span>',p:"Дашборд сам считает конверсию, заработок и воронку за день/неделю/месяц."}];
let onbI=0;
function startOnboarding(){onbI=0;renderOnb()}
function renderOnb(){const s=ONB[onbI],root=document.getElementById("onb-root");
  root.innerHTML=`<div class="onb"><div class="ic">${s.ic}</div><h1>${s.t}</h1><p>${s.p}</p>
    <div class="dots">${ONB.map((_,i)=>`<i class="${i===onbI?'on':''}"></i>`).join("")}</div>
    <div class="navb"><button class="skip" id="onb-skip">Пропустить</button><button class="next" id="onb-next">${onbI<ONB.length-1?"Дальше":"Поехали 🚀"}</button></div></div>`;
  document.getElementById("onb-next").onclick=()=>{buzz("light");if(onbI<ONB.length-1){onbI++;renderOnb()}else finishOnb()};
  document.getElementById("onb-skip").onclick=finishOnb}
function finishOnb(){state.onboarded=true;save();document.getElementById("onb-root").innerHTML=""}
function applyTheme(){document.documentElement.setAttribute("data-theme",state.settings.theme);
  try{const tg=window.Telegram&&window.Telegram.WebApp,c=state.settings.theme==="dark"?"#161616":"#e9e9ec";tg&&tg.setHeaderColor&&tg.setHeaderColor(c);tg&&tg.setBackgroundColor&&tg.setBackgroundColor(c)}catch(e){}}
function refresh(){document.getElementById("today-num").textContent=todayWrote();
  const ready=state.leads.filter(l=>l.status==="nostory"&&(l.nostoryAt+DAY_MS)<=Date.now()).length;
  document.querySelectorAll("nav button").forEach(b=>{let o=b.querySelector(".dot");if(o)o.remove();
    if(b.dataset.tab==="later"&&ready>0){const d=document.createElement("span");d.className="dot";d.textContent=ready;b.appendChild(d)}})}
function show(tab){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+tab).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  if(tab==="work"){batchSession.start=0;renderWork()}if(tab==="funnel")renderFunnel();if(tab==="later")renderLater();if(tab==="dash")renderDash();if(tab==="settings")renderSettings()}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>show(b.dataset.tab));
const li=document.getElementById("load-input");
li.addEventListener("input",()=>{const p=parseLeads(li.value);document.getElementById("load-preview").innerHTML=p.length?`Распознано <b>${p.length}</b>: ${p.slice(0,6).map(h=>"@"+h).join(", ")}${p.length>6?" …":""}`:`Вставь ссылки или @юзернеймы.`});
document.getElementById("load-btn").onclick=()=>{const p=parseLeads(li.value);if(!p.length){toast("Не нашёл ссылок");return}const n=addLeads(p);li.value="";document.getElementById("load-preview").innerHTML="";toast(n?`Добавлено ${n}`+(p.length-n?` · дублей ${p.length-n}`:""):"Все уже в базе");show("work")};
document.getElementById("batch-btn").onclick=startBatch;
document.getElementById("wipe-btn").onclick=()=>{if(confirm("Удалить ВСЮ базу безвозвратно?")){state.leads=[];save();if(CLOUD_READY&&TG_ID){sbDelete("konva_leads","tg_id=eq."+encodeURIComponent(TG_ID)).catch(e=>console.warn("cloud wipe",e))}toast("База очищена");show("work")}};
document.querySelectorAll("#funnel-seg button").forEach(b=>b.onclick=()=>{funnelFilter=b.dataset.f;document.querySelectorAll("#funnel-seg button").forEach(x=>x.classList.toggle("active",x===b));renderFunnel()});
document.querySelectorAll("#dash-seg button").forEach(b=>b.onclick=()=>{dashPeriod=b.dataset.p;document.querySelectorAll("#dash-seg button").forEach(x=>x.classList.toggle("active",x===b));renderDash()});
try{const tg=window.Telegram&&window.Telegram.WebApp;if(tg){tg.ready();tg.expand()}}catch(e){}
applyTheme();

/* ===== BOOT: local first, then cloud sync ===== */
MY_CODE=codeFromId(rawTgId()); // unique per telegram user
TG_ID=getTgId();
// manual re-pull on tapping the sync dot
(function(){const d=document.getElementById("sync-dot");if(d)d.onclick=async()=>{if(!TG_ID)return;setSyncDot("syncing");try{const cloud=await cloudPull();state.leads=mergeStates(state.leads,cloud.leads);if(cloud.settings){if(cloud.settings.templates)state.templates=cloud.settings.templates;if(cloud.settings.settings)state.settings=Object.assign({},DEFAULTS.settings,cloud.settings.settings)}localStorage.setItem(KEY,JSON.stringify(state));setSyncDot("ok");applyTheme();const a=document.querySelector(".screen.active"),tab=a?a.id.replace("screen-",""):"work";show(tab);refresh();toast("Обновлено из облака")}catch(e){setSyncDot("err");toast("Нет связи с облаком")}}})();
// 1. paint local immediately so app feels instant
refresh();renderWork();
if(!state.onboarded&&state.leads.length===0)startOnboarding();
// 2. then reconcile with cloud
(async function cloudBoot(){
  setSyncDot("syncing");
  try{
    await migrateLegacyToCode();
    const cloud=await cloudPull();
    // merge leads (local + cloud, newest wins)
    const merged=mergeStates(state.leads,cloud.leads);
    state.leads=merged;
    // settings: cloud wins if present (so theme/templates follow you across devices)
    if(cloud.settings){
      if(cloud.settings.templates)state.templates=cloud.settings.templates;
      if(cloud.settings.settings)state.settings=Object.assign({},DEFAULTS.settings,cloud.settings.settings);
      if(typeof cloud.settings.onboarded==="boolean")state.onboarded=cloud.settings.onboarded;
    }
    localStorage.setItem(KEY,JSON.stringify(state));
    CLOUD_READY=true;
    // push merged result back up so cloud has the union
    await cloudPushAll();
    setSyncDot("ok");
    applyTheme();
    // repaint whatever screen is active
    const active=document.querySelector(".screen.active");
    const tab=active?active.id.replace("screen-",""):"work";
    if(tab==="work")renderWork();else if(tab==="funnel")renderFunnel();else if(tab==="later")renderLater();else if(tab==="dash")renderDash();else if(tab==="settings")renderSettings();
    refresh();
  }catch(e){
    console.warn("cloud boot failed, staying local:",e);
    CLOUD_READY=true; // still allow future pushes to retry
    setSyncDot("err");
  }
  // only seed demo if truly empty everywhere and never onboarded
  if(state.leads.length===0){addLeads(["demo_anna_smm","fit_club_batumi","cold_lead_pro"]);renderWork();if(!state.onboarded)startOnboarding()}
})();

</script>
